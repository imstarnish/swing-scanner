<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#030609"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SwingScanner"/>
  <link rel="manifest" href="manifest.json"/>
  <title>NSE Swing Scanner Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #030609;
      --bg2:      #070d14;
      --surface:  #0b1520;
      --surface2: #0f1d2e;
      --border:   #162438;
      --border2:  #1e3550;
      --accent:   #00c8ff;
      --green:    #00e5a0;
      --red:      #ff3d5a;
      --gold:     #ffb800;
      --purple:   #a78bfa;
      --text:     #c8d8e8;
      --muted:    #3d5a78;
      --radius:   14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;overflow-x:hidden}
    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px;transition:opacity .6s}
    .splash-icon{font-size:52px;animation:float 2s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .splash-title{font-size:24px;font-weight:800;color:#fff;letter-spacing:1px}
    .splash-sub{font-size:10px;color:var(--muted);letter-spacing:4px}
    .splash-bar{width:180px;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .splash-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));width:0;transition:width 2.2s ease;border-radius:2px}
    /* ── HEADER ── */
    .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100}
    .header-row{display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .h-icon{width:34px;height:34px;background:linear-gradient(135deg,#003d55,#006688);border:1px solid var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .h-title{font-size:15px;font-weight:800;color:#e8f4ff}
    .h-sub{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:1px}
    .h-btns{display:flex;gap:8px}
    .hbtn{width:34px;height:34px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
    .hbtn.on{border-color:var(--green);background:#00e5a015;color:var(--green)}
    /* ── TICKER ── */
    .ticker-bar{background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;padding:7px 14px;gap:20px}
    .ticker-bar::-webkit-scrollbar{display:none}
    .ti{display:flex;flex-direction:column;flex-shrink:0;gap:1px}
    .ti-label{font-size:8px;color:var(--muted);letter-spacing:1.5px;font-family:'JetBrains Mono',monospace}
    .ti-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
    /* ── TABS ── */
    .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 8px}
    .tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    /* ── CONTENT ── */
    .page{padding:14px 14px 90px;display:none}
    .page.active{display:block}
    /* ── CARDS / SHARED ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
    .card.highlight{border-color:var(--accent)}
    .card-body{padding:14px}
    /* ── STAT ROW ── */
    .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
    .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
    .stat-box.wide{grid-column:span 3}
    .slabel{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:3px}
    .sval{font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .ssub{font-size:9px;color:var(--muted);margin-top:2px}
    /* ── SCAN BTN ── */
    .scan-btn{width:100%;padding:15px;background:linear-gradient(135deg,#003a55,#00567a);border:1px solid var(--accent);border-radius:var(--radius);color:#fff;font-family:'Manrope',sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;transition:all .2s}
    .scan-btn:active{transform:scale(.98)}
    .scan-btn.busy{background:linear-gradient(135deg,#002a1a,#003d28);border-color:var(--green)}
    /* ── CHIPS ── */
    .chips{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:12px}
    .chips::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .2s}
    .chip.active{background:#003a55;border-color:var(--accent);color:var(--accent)}
    /* ── STOCK CARD ── */
    .sc-head{padding:13px 14px;cursor:pointer}
    .sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .sc-sym{font-size:15px;font-weight:800;color:#e8f4ff}
    .sc-name{font-size:9px;color:var(--muted);margin-top:2px}
    .sc-badges{display:flex;gap:5px;align-items:center}
    .badge{padding:3px 9px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.5px}
    .badge-sb{background:#00c8ff18;border:1px solid var(--accent);color:var(--accent)}
    .badge-b{background:#00e5a018;border:1px solid var(--green);color:var(--green)}
    .badge-sec{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
    .badge-live{font-size:8px;color:var(--green)}
    .sc-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .met-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:2px}
    .met-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .c-green{color:var(--green)} .c-red{color:var(--red)} .c-gold{color:var(--gold)} .c-blue{color:var(--accent)} .c-purple{color:var(--purple)}
    /* ── DETAIL PANEL ── */
    .detail{border-top:1px solid var(--border);padding:13px;background:var(--bg2)}
    .trade-plan{background:var(--surface);border-radius:10px;padding:12px;margin-bottom:10px}
    .tp-title{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:8px}
    .tp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
    .tp-row:last-child{border-bottom:none}
    .tp-key{font-size:11px;color:var(--muted)}
    .tp-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
    /* ── INDICATORS ROW ── */
    .ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
    .ind-box{background:var(--surface);border-radius:8px;padding:9px 10px;border:1px solid var(--border)}
    .ind-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:3px}
    .ind-val{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
    /* ── PROGRESS ── */
    .prog-wrap{margin-bottom:10px}
    .prog-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:4px;font-family:'JetBrains Mono',monospace}
    .prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
    .prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--green))}
    /* ── ADD TO PORTFOLIO BTN ── */
    .add-btn{width:100%;padding:11px;background:linear-gradient(135deg,#1a0a30,#2d1060);border:1px solid var(--purple);border-radius:10px;color:var(--purple);font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:4px}
    /* ── PORTFOLIO ── */
    .port-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .ps-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
    .ps-label{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:4px}
    .ps-val{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .ps-sub{font-size:9px;color:var(--muted);margin-top:2px}
    /* ── TRADE CARD ── */
    .trade-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
    .trade-card.profit{border-left:3px solid var(--green)}
    .trade-card.loss{border-left:3px solid var(--red)}
    .trade-card.target-hit{border-left:3px solid var(--gold)}
    .tc-head{padding:13px 14px;cursor:pointer}
    .tc-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .tc-sym{font-size:15px;font-weight:800;color:#e8f4ff}
    .tc-pnl{font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .tc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .tc-detail{border-top:1px solid var(--border);padding:13px;background:var(--bg2)}
    /* ── ADD TRADE FORM ── */
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
    .form-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:12px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .form-row.single{grid-template-columns:1fr}
    .flabel{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;display:block}
    .finput{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
    .finput:focus{border-color:var(--accent)}
    .fselect{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Manrope',sans-serif;font-size:12px;outline:none;appearance:none}
    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#003a55,#00567a);border:1px solid var(--accent);border-radius:10px;color:#fff;font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;cursor:pointer;margin-top:4px}
    .btn-exit{padding:8px 16px;background:#2a0a10;border:1px solid var(--red);border-radius:8px;color:var(--red);font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
    .btn-del{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Manrope',sans-serif;font-size:11px;cursor:pointer}
    /* ── SETUP PAGE ── */
    .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:14px}
    .setup-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:12px}
    .step{display:flex;gap:11px;margin-bottom:13px}
    .step-n{width:22px;height:22px;background:var(--accent);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
    .step-t{font-size:12px;font-weight:700;color:#e8f4ff;margin-bottom:3px}
    .step-d{font-size:10px;color:var(--muted);line-height:1.6}
    .step-link{color:var(--accent);font-size:10px}
    .conn-bar{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:11px;margin-bottom:14px}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
    .dot.demo{background:var(--gold)}
    .dot.off{background:var(--red)}
    /* ── SPINNER / SHIMMER ── */
    .spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:6px}
    @keyframes shim{to{background-position:-200% 0}}
    /* ── BOTTOM NAV ── */
    .bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;color:var(--muted);font-size:8px;letter-spacing:1px;font-weight:700;transition:color .2s}
    .bni.active{color:var(--accent)}
    .bni-icon{font-size:19px}
    /* ── EMPTY ── */
    .empty{text-align:center;padding:50px 20px}
    .empty-icon{font-size:44px;margin-bottom:14px;opacity:.3}
    .empty-t{font-size:15px;font-weight:700;color:var(--muted);margin-bottom:7px}
    .empty-s{font-size:11px;color:var(--muted);line-height:1.6}
    /* ── TOAST ── */
    .btn-sm{padding:4px 10px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:10px;cursor:pointer}
    .toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:9px 18px;font-size:11px;color:var(--text);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-weight:600}
    .toast.show{opacity:1}
    /* ── MODAL ── */
    .modal-bg{position:fixed;inset:0;background:#000a;z-index:9999;display:none;align-items:flex-end;justify-content:center}
    .modal-bg.open{display:flex}
    .modal-bg.open .modal-box{pointer-events:all}
    .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-height:85vh;overflow-y:auto}
    .modal-title{font-size:14px;font-weight:800;color:#e8f4ff;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
    .modal-close{background:var(--surface);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
    /* ── MISC ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .25s ease forwards}
    .disclaimer{font-size:9px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;line-height:1.7;margin-top:14px}
  </style>
</head>
<body>

<!-- SPLASH -->

<div id="splash">
  <div class="splash-icon">📡</div>
  <div class="splash-title">SWING SCANNER</div>
  <div class="splash-sub">NSE · REAL INDICATORS · PORTFOLIO</div>
  <div class="splash-bar"><div class="splash-fill" id="sfill"></div></div>
</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<!-- ADD TRADE MODAL -->

<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div class="modal-title">
      <span>📥 Add Trade</span>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- HEADER -->

<div class="header" id="main-ui" style="display:none">
  <div class="header-row">
    <div class="header-left">
      <div class="h-icon">📡</div>
      <div>
        <div class="h-title">SWING SCANNER</div>
        <div class="h-sub" id="h-sub">NSE · INDIA EQUITY</div>
      </div>
    </div>
    <div class="h-btns">
      <div class="hbtn" id="auto-btn" onclick="toggleAuto()">🔄</div>
      <div class="hbtn" onclick="requestNotif()">🔔</div>
    </div>
  </div>
</div>

<!-- TICKER -->

<div class="ticker-bar" id="ticker-bar" style="display:none">
  <div class="ti"><div class="ti-label">NIFTY 50</div><div class="ti-val" id="t-nifty">–</div></div>
  <div class="ti"><div class="ti-label">BANK NIFTY</div><div class="ti-val" id="t-bn">–</div></div>
  <div class="ti"><div class="ti-label">INDIA VIX</div><div class="ti-val" id="t-vix" style="color:var(--gold)">–</div></div>
  <div class="ti"><div class="ti-label">SENSEX</div><div class="ti-val" id="t-sx">–</div></div>
  <div class="ti"><div class="ti-label">MARKET</div><div class="ti-val" id="t-bias" style="color:var(--green)">–</div></div>
</div>

<!-- TABS -->

<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" id="tab-scan" onclick="switchTab('scan')">📊 SCAN</div>
  <div class="tab" id="tab-port" onclick="switchTab('port')">💼 PORTFOLIO</div>
  <div class="tab" id="tab-hist" onclick="switchTab('hist')">📈 HISTORY</div>
  <div class="tab" id="tab-setup" onclick="switchTab('setup')">⚙️ SETUP</div>
  <div class="tab" id="tab-log" onclick="switchTab('log')">🗂 LOG</div>
</div>

<!-- PAGES -->

<div class="page active" id="page-scan"></div>
<div class="page" id="page-port"></div>
<div class="page" id="page-hist"></div>
<div class="page" id="page-setup"></div>
<div class="page" id="page-log"></div>

<!-- BOTTOM NAV -->

<div class="bnav" id="bnav" style="display:none">
  <div class="bni active" id="nav-scan" onclick="switchTab('scan')"><div class="bni-icon">📊</div>SCAN</div>
  <div class="bni" id="nav-port" onclick="switchTab('port')"><div class="bni-icon">💼</div>PORTFOLIO</div>
  <div class="bni" id="nav-hist" onclick="switchTab('hist')"><div class="bni-icon">📈</div>HISTORY</div>
  <div class="bni" id="nav-setup" onclick="switchTab('setup')"><div class="bni-icon">⚙️</div>SETUP</div>
  <div class="bni" id="nav-log" onclick="switchTab('log')"><div class="bni-icon">🗂</div>LOG</div>
</div>

<script>
// ═══════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════
const S = {
  tab: 'scan',
  results: [],
  scanning: false,
  filterSec: 'All',
  expanded: null,
  autoOn: false,
  autoTimer: null,
  demoMode: true,
  exitAlerts: [],
  stopScan: false,
  // Upstox credentials
  token: localStorage.getItem('upstox_token') || '',
  proxyUrl: localStorage.getItem('proxy_url') || '',
  // Portfolio: active trades
  trades: JSON.parse(localStorage.getItem('trades') || '[]'),
  // Closed trades history
  history: JSON.parse(localStorage.getItem('history') || '[]'),
};

function saveTrades(){ localStorage.setItem('trades', JSON.stringify(S.trades)); }

// ═══════════════════════════════════════
// STRATEGY BRAIN — Adaptive Learning Engine
// Learns from your closed trades to improve signal weights
// ═══════════════════════════════════════

const BRAIN_KEY = 'strategy_brain_v1';

// Default signal weights — will shift based on your win/loss history
function defaultWeights() {
  return {
    rsi:        { weight: 20, desc: 'RSI 30-65' },
    ema_trend:  { weight: 20, desc: 'Price > EMA20' },
    macd:       { weight: 15, desc: 'MACD Bullish' },
    volume:     { weight: 15, desc: 'Volume Surge' },
    rs:         { weight: 10, desc: 'Rel. Strength vs Nifty' },
    vcp:        { weight: 10, desc: 'Volatility Contraction' },
    rr:         { weight: 10, desc: 'Risk:Reward >= 2x' },
  };
}

function loadBrain() {
  try {
    const b = JSON.parse(localStorage.getItem(BRAIN_KEY) || 'null');
    if (b && b.weights) return b;
  } catch(e) {}
  return { weights: defaultWeights(), setupStats: {}, sectorStats: {}, version: 1 };
}

function saveBrain(brain) {
  localStorage.setItem(BRAIN_KEY, JSON.stringify(brain));
}

// Called every time a trade is closed — updates weights based on outcome
function learnFromTrade(trade) {
  const brain = loadBrain();
  const won = trade.pnl > 0;
  const setup = trade.setup || 'Unknown';
  const sector = trade.sector || 'Other';
  const signals = trade.signals || {};

  // Update setup stats
  if (!brain.setupStats[setup]) brain.setupStats[setup] = { wins: 0, losses: 0 };
  won ? brain.setupStats[setup].wins++ : brain.setupStats[setup].losses++;

  // Update sector stats
  if (!brain.sectorStats[sector]) brain.sectorStats[sector] = { wins: 0, losses: 0 };
  won ? brain.sectorStats[sector].wins++ : brain.sectorStats[sector].losses++;

  // Adaptive weight adjustment — nudge weights based on which signals were present
  const nudge = won ? 0.5 : -0.5;
  const MIN_W = 5, MAX_W = 40;
  for (const [sig, wasActive] of Object.entries(signals)) {
    if (brain.weights[sig] && wasActive) {
      brain.weights[sig].weight = Math.min(MAX_W, Math.max(MIN_W,
        brain.weights[sig].weight + nudge
      ));
    }
  }

  // Renormalize weights to sum to 100
  const total = Object.values(brain.weights).reduce((a, w) => a + w.weight, 0);
  for (const sig in brain.weights) {
    brain.weights[sig].weight = Math.round((brain.weights[sig].weight / total) * 100);
  }

  saveBrain(brain);
  console.log('Brain updated. New weights:', brain.weights);
}

// Calculate proprietary conviction score (0-100) using adaptive weights
function calcConvictionScore(signals, ltp, candles, rsi, ema20, ema50, volMult, rr, niftyReturn) {
  const brain = loadBrain();
  const w = brain.weights;
  let score = 0;

  // RSI signal (30-50 = best zone for swing entry)
  const rsiScore = rsi >= 30 && rsi <= 50 ? 100 : rsi > 50 && rsi <= 65 ? 70 : 40;
  score += (w.rsi.weight / 100) * rsiScore;
  signals.rsi = rsi >= 30 && rsi <= 65;

  // EMA trend
  const emaTrend = ltp > ema20 && (!ema50 || ltp > ema50);
  score += (w.ema_trend.weight / 100) * (emaTrend ? 100 : 30);
  signals.ema_trend = emaTrend;

  // MACD
  const macdData = calcMACD(candles.map(c => c.close));
  const macdBull = macdData?.bullish;
  score += (w.macd.weight / 100) * (macdBull ? 100 : 0);
  signals.macd = !!macdBull;

  // Volume — use 3-day avg vs 20-day avg for stability (less intraday noise)
  // Single-candle volMult swings wildly during the day as volume accumulates
  const vol3avg = candles.slice(-4,-1).reduce((a,c)=>a+c.volume,0) / 3;
  const vol20avg = candles.slice(-21,-1).reduce((a,c)=>a+c.volume,0) / 20;
  const stableVolMult = vol20avg > 0 ? vol3avg / vol20avg : 1;
  const volScore = stableVolMult >= 1.5 ? 100 : stableVolMult >= 1.2 ? 70 : stableVolMult >= 1.0 ? 50 : 30;
  score += (w.volume.weight / 100) * volScore;
  signals.volume = stableVolMult >= 1.0;

  // Relative strength vs Nifty
  let rsScore = 50;
  if (niftyReturn !== null && candles.length >= 20) {
    const stockReturn = (ltp - candles[candles.length - 20].close) / candles[candles.length - 20].close * 100;
    rsScore = stockReturn > niftyReturn ? 100 : stockReturn > 0 ? 60 : 20;
    signals.rs = stockReturn > niftyReturn;
  }
  score += (w.rs.weight / 100) * rsScore;

  // Volatility contraction (VCP) — tight range in last 5 days
  if (candles.length >= 10) {
    const last5 = candles.slice(-5);
    const last10 = candles.slice(-10);
    const range5  = (Math.max(...last5.map(c=>c.high))  - Math.min(...last5.map(c=>c.low)))  / ltp;
    const range10 = (Math.max(...last10.map(c=>c.high)) - Math.min(...last10.map(c=>c.low))) / ltp;
    const vcpScore = range5 < range10 * 0.7 ? 100 : range5 < range10 * 0.85 ? 70 : 30;
    score += (w.vcp.weight / 100) * vcpScore;
    signals.vcp = range5 < range10 * 0.85;
  }

  // Risk:Reward
  const rrScore = rr >= 3 ? 100 : rr >= 2.5 ? 85 : rr >= 2 ? 70 : rr >= 1.5 ? 50 : 20;
  score += (w.rr.weight / 100) * rrScore;
  signals.rr = rr >= 2;

  // Sector boost from brain learning
  const brain2 = loadBrain();
  // (sector passed separately — handled in caller)

  return Math.round(Math.min(100, Math.max(0, score)));
}

// Additional indicators — Relative Strength vs Nifty & VCP
function calcRelativeStrength(candles, niftyReturn) {
  if (!candles || candles.length < 20 || niftyReturn === null) return null;
  const stockReturn20d = (candles[candles.length-1].close - candles[candles.length-20].close)
                        / candles[candles.length-20].close * 100;
  return parseFloat((stockReturn20d - niftyReturn).toFixed(2)); // positive = outperforming Nifty
}

// ── ATR-14 (Average True Range) ──────────────────────────────────────────
// Used for volatility-adjusted SL/Target (Tier 2, item 5)
function calcATR(candles, period=14) {
  if (!candles || candles.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < candles.length; i++) {
    const prev = candles[i-1].close;
    const c = candles[i];
    trs.push(Math.max(c.high - c.low, Math.abs(c.high - prev), Math.abs(c.low - prev)));
  }
  // Wilder's smoothing (same as RSI)
  let atr = trs.slice(0, period).reduce((a,b)=>a+b,0) / period;
  for (let i = period; i < trs.length; i++) {
    atr = (atr * (period-1) + trs[i]) / period;
  }
  return atr;
}

// ── Stage Analysis (Tier 1, item 1) ──────────────────────────────────────
// Weinstein stage model simplified to weekly EMA checks
// Returns { stage: 1|2|3|4, rising20: bool, rising50: bool, hierarchy: bool }
// Stage 2 = accumulation/markup = ideal entry zone
// Stage 3 = distribution = avoid
function calcStageAnalysis(wCandles) {
  if (!wCandles || wCandles.length < 30) return null;
  const closes = wCandles.map(c => c.close);
  const n = closes.length;

  // Calculate 20w and 50w EMA properly (not SMA)
  const k20 = 2 / 21, k50 = 2 / 51;
  let ema20 = closes.slice(0,20).reduce((a,b)=>a+b,0) / 20;
  for (let i = 20; i < n; i++) ema20 = closes[i]*k20 + ema20*(1-k20);

  let ema50 = closes.slice(0,Math.min(50,n)).reduce((a,b)=>a+b,0) / Math.min(50,n);
  for (let i = Math.min(50,n); i < n; i++) ema50 = closes[i]*k50 + ema50*(1-k50);

  // Check if 20w EMA is rising (last 4 weeks)
  const ema20vals = [];
  let e20 = closes.slice(0,20).reduce((a,b)=>a+b,0) / 20;
  for (let i = 20; i < n; i++) {
    e20 = closes[i]*k20 + e20*(1-k20);
    if (i >= n-5) ema20vals.push(e20);
  }
  const rising20 = ema20vals.length >= 2 && ema20vals[ema20vals.length-1] > ema20vals[0];

  // Check if 50w EMA is rising
  const ema50vals = [];
  let e50 = closes.slice(0,Math.min(50,n)).reduce((a,b)=>a+b,0) / Math.min(50,n);
  for (let i = Math.min(50,n); i < n; i++) {
    e50 = closes[i]*k50 + e50*(1-k50);
    if (i >= n-5) ema50vals.push(e50);
  }
  const rising50 = ema50vals.length >= 2 && ema50vals[ema50vals.length-1] > ema50vals[0];

  const ltp = closes[n-1];
  const hierarchy = ema20 > ema50;           // 20w EMA above 50w EMA
  const priceAbove = ltp > ema20 && ltp > ema50;

  // Stage determination
  let stage;
  if (priceAbove && rising20 && rising50 && hierarchy) stage = 2;       // ideal
  else if (priceAbove && rising20 && !rising50)         stage = 2;       // early stage 2
  else if (!priceAbove && !rising20 && rising50)        stage = 3;       // topping
  else if (!priceAbove && !rising20 && !rising50)       stage = 4;       // decline
  else                                                   stage = 1;       // base

  return { stage, rising20, rising50, hierarchy, ema20: Math.round(ema20), ema50: Math.round(ema50) };
}

// ── VCP Tightness Score (Tier 1, item 2) ─────────────────────────────────
// Measures quality of volatility contraction, not just presence
// Looks at last 4 weekly ranges — each should be smaller than previous
// Returns { score: 0-15, contractions: number, quality: 'Strong'|'Moderate'|'Weak'|null }
function calcVCPTightness(wCandles) {
  if (!wCandles || wCandles.length < 8) return { score: 0, contractions: 0, quality: null };

  // Use last 5 weekly candles to get 4 range measurements
  const recent = wCandles.slice(-5);
  const ranges = recent.map(c => (c.high - c.low) / c.close * 100); // % range

  let contractions = 0;
  let totalContraction = 0;
  for (let i = 1; i < ranges.length; i++) {
    if (ranges[i] < ranges[i-1]) {
      contractions++;
      totalContraction += (ranges[i-1] - ranges[i]) / ranges[i-1]; // % reduction
    }
  }

  // Also check absolute tightness — last week range < 2% is very tight
  const lastRange = ranges[ranges.length-1];
  const isTight = lastRange < 2.0;

  let score = 0;
  let quality = null;
  if (contractions >= 3 && isTight) { score = 15; quality = 'Strong'; }
  else if (contractions >= 3)        { score = 10; quality = 'Moderate'; }
  else if (contractions >= 2)        { score = 6;  quality = 'Weak'; }
  else if (contractions >= 1)        { score = 2;  quality = null; }

  return { score, contractions, quality, lastRangePct: lastRange.toFixed(1) };
}

// ── Liquidity Floor (Tier 3, item 9) ─────────────────────────────────────
// Returns average daily traded value in crores over last 20 days
// Minimum threshold: ₹10 crore/day — below this, exit risk is high
function calcLiquidity(candles) {
  if (!candles || candles.length < 5) return null;
  const recent = candles.slice(-20);
  const avgValue = recent.reduce((a,c) => a + c.close * c.volume, 0) / recent.length;
  return avgValue / 1e7; // convert to crores
}

// ── False Breakout Check (Tier 3, item 8) ────────────────────────────────
// Check if stock had a failed breakout in last 8 weeks on daily candles
// Failed = made new 20-day high then closed below breakout level within 5 days
function checkFalseBreakout(candles) {
  if (!candles || candles.length < 30) return false;
  const lookback = candles.slice(-40, -5); // 5–40 days ago
  if (lookback.length < 20) return false;

  for (let i = 10; i < lookback.length; i++) {
    const window = lookback.slice(0, i);
    const prevHigh = Math.max(...window.map(c=>c.high));
    const breakoutCandle = lookback[i];
    if (breakoutCandle.high > prevHigh) {
      // Was a new high — check if it failed (closed back below prevHigh within 5 days)
      const after = lookback.slice(i+1, i+6);
      const failed = after.some(c => c.close < prevHigh * 0.99);
      if (failed) return true;
    }
  }
  return false;
}

// ═══════════════════════════════════════════════════════════════
// TIER 1, ITEM 1: Multi-Timeframe Confirmation
// Weekly = direction (Stage 2, EMA hierarchy, weekly RSI)
// Daily  = entry trigger (daily VCP, daily EMA reclaim, RSI in buy zone)
// MTF_ALIGNED when both timeframes agree
// ═══════════════════════════════════════════════════════════════
function calcMTFAlignment(wCandles, dCandles, wStage, rsi, ema20d, ema50d) {
  const result = { aligned: false, reasons: [], score: 0 };
  if (!wCandles || !dCandles) return result;

  // Weekly direction checks (already computed via stageInfo)
  const weeklyBull = wStage && (wStage.stage === 2 || wStage.stage === 1)
                     && wStage.rising20 && wStage.hierarchy;
  if (!weeklyBull) return result; // weekly not set up — MTF can't be aligned

  // Daily entry trigger checks
  const dailyChecks = [];

  // 1. Daily price above 20-day EMA (short-term trend intact)
  const lastClose = dCandles[dCandles.length - 1].close;
  if (ema20d && lastClose > ema20d) dailyChecks.push('Above 20 EMA');

  // 2. Daily RSI in entry zone 40–65 (not overbought, not oversold)
  if (rsi >= 40 && rsi <= 65) dailyChecks.push('RSI entry zone');

  // 3. Daily VCP present (volatility contraction on daily)
  const dLast5  = dCandles.slice(-5);
  const dLast10 = dCandles.slice(-10);
  const dRef = lastClose || 1;
  const dRange5  = (Math.max(...dLast5.map(c=>c.high))  - Math.min(...dLast5.map(c=>c.low)))  / dRef;
  const dRange10 = (Math.max(...dLast10.map(c=>c.high)) - Math.min(...dLast10.map(c=>c.low))) / dRef;
  if (dRange5 < dRange10 * 0.70) dailyChecks.push('Daily VCP');

  // 4. Higher lows pattern: last 3 swing lows are rising
  if (dCandles.length >= 15) {
    const lows = dCandles.slice(-15).map(c => c.low);
    const hl = lows[lows.length-1] > lows[Math.floor(lows.length/2)]
            && lows[Math.floor(lows.length/2)] > lows[0];
    if (hl) dailyChecks.push('Higher lows');
  }

  // MTF aligned = weekly bullish + at least 2 daily triggers confirmed
  result.reasons = dailyChecks;
  result.score = dailyChecks.length;
  result.aligned = weeklyBull && dailyChecks.length >= 2;
  return result;
}

// ═══════════════════════════════════════════════════════════════
// TIER 1, ITEM 2: Resistance Zone Detection
// Scans weekly candles for price levels where stock reversed 3+ times
// Returns { zones: [{price, touches}], nearestAbove, clearAbove }
// ═══════════════════════════════════════════════════════════════
function detectResistanceZones(wCandles, entryPrice) {
  if (!wCandles || wCandles.length < 20) return { zones: [], clearAbove: true };

  const BAND = 0.015; // ±1.5% price band to cluster reversals
  const MIN_TOUCHES = 3;

  // Collect all weekly highs as potential resistance levels
  const highs = wCandles.map(c => c.high);

  // Find levels where multiple highs cluster within ±1.5%
  const zones = [];
  const used = new Set();

  for (let i = 0; i < highs.length; i++) {
    if (used.has(i)) continue;
    const level = highs[i];
    const band = level * BAND;
    const touches = highs.filter((h, j) => {
      if (Math.abs(h - level) <= band) { used.add(j); return true; }
      return false;
    });
    if (touches.length >= MIN_TOUCHES) {
      zones.push({ price: Math.round(level), touches: touches.length });
    }
  }

  // Sort zones descending by price
  zones.sort((a, b) => b.price - a.price);

  // Find nearest resistance zone above entry
  const overhead = zones.filter(z => z.price > entryPrice * 1.005); // at least 0.5% above
  const nearestAbove = overhead.length ? overhead[overhead.length - 1] : null; // lowest overhead zone

  // "Approaching" = entry is within 3% below a resistance zone
  const approaching = nearestAbove && (nearestAbove.price - entryPrice) / entryPrice < 0.03;

  // "Clear above" = no resistance zone within the target range (entry → target)
  const clearAbove = overhead.length === 0;

  return {
    zones: overhead.slice(0, 3), // top 3 overhead zones
    nearestAbove,
    approaching,
    clearAbove
  };
}

// ═══════════════════════════════════════════════════════════════
// TIER 2, ITEM 3: Trend Consistency Score
// Count weekly closes above 20-week EMA over last 12 weeks
// Returns { consistent: bool, weeksAbove: number, quality: string }
// ═══════════════════════════════════════════════════════════════
function calcTrendConsistency(wCandles) {
  if (!wCandles || wCandles.length < 20) return { weeksAbove: 0, quality: 'Unknown' };

  const closes = wCandles.map(c => c.close);
  const n = closes.length;
  const k20 = 2 / 21;

  // Build full EMA20 history
  const ema20hist = [];
  let ema = closes.slice(0, 20).reduce((a,b)=>a+b,0) / 20;
  for (let i = 20; i < n; i++) {
    ema = closes[i]*k20 + ema*(1-k20);
    ema20hist.push({ close: closes[i], ema20: ema });
  }

  // Check last 12 weeks
  const last12 = ema20hist.slice(-12);
  const weeksAbove = last12.filter(w => w.close > w.ema20).length;

  let quality;
  if (weeksAbove >= 10)     quality = 'Consistent';   // +conviction bonus
  else if (weeksAbove >= 6) quality = 'Moderate';     // neutral
  else                      quality = 'Choppy';        // warn on card

  return { weeksAbove, quality, outOf: last12.length };
}

// ═══════════════════════════════════════════════════════════════
// TIER 2, ITEM 5: Gap Detection
// Finds unfilled price gaps on daily candles
// Gap up = today's low > yesterday's high (unfilled if never traded back through)
// Gap down = today's high < yesterday's low
// ═══════════════════════════════════════════════════════════════
function detectGaps(candles, entryPrice, targetPrice) {
  if (!candles || candles.length < 10) return { gapsAbove: [], gapsBelow: [] };

  const gapsUp   = [];
  const gapsDown = [];

  for (let i = 1; i < candles.length - 1; i++) { // exclude last (in-progress)
    const prev = candles[i-1];
    const curr = candles[i];

    // Gap up: curr.low > prev.high
    if (curr.low > prev.high * 1.002) { // 0.2% buffer to avoid noise
      // Check if gap is still unfilled (no subsequent candle traded in gap zone)
      const filled = candles.slice(i+1).some(c => c.low <= curr.low * 1.001);
      if (!filled) gapsUp.push({ bottom: Math.round(prev.high), top: Math.round(curr.low) });
    }

    // Gap down: curr.high < prev.low
    if (curr.high < prev.low * 0.998) {
      const filled = candles.slice(i+1).some(c => c.high >= curr.high * 0.999);
      if (!filled) gapsDown.push({ bottom: Math.round(curr.high), top: Math.round(prev.low) });
    }
  }

  // Filter to gaps relevant to our trade
  const gapsAbove = gapsUp.filter(g => g.bottom > entryPrice && g.bottom < targetPrice * 1.1);
  const gapsBelow = gapsDown.filter(g => g.top < entryPrice && g.top > entryPrice * 0.90);

  return { gapsAbove, gapsBelow };
}

function autoLogSignal(result) {
  const log = loadSignalLog();
  // Avoid duplicate logging same stock on same day
  const today = new Date().toISOString().split('T')[0];
  const exists = log.some(e => e.sym === result.sym && e.date === today);
  if (exists) return;

  const entry = {
    id: Date.now(),
    date: today,
    sym: result.sym,
    name: result.name,
    score: result.conviction,
    stage: result.stage,
    vcpGrade: result.vcpQuality || null,
    mtfAligned: result.mtfAligned || false,
    entry: result.entry,
    sl: result.sl,
    target: result.target,
    rr: result.rr,
    atr: result.atr || null,
    flags: [
      ...(result.weeklyFlags || []),
      result.falseBrk ? 'PRIOR_FAILED_BRK' : null,
      result.isPolicySensitive ? 'POLICY_SECTOR' : null,
      result.stageWarning || null,
      result.trendConsistency === 'Choppy' ? 'CHOPPY_TREND' : null,
      result.resistanceApproaching ? 'NEAR_RESISTANCE' : null,
    ].filter(Boolean),
    setup: result.setup,
    verdict: result.verdict,
    outcome: null,      // 'TARGET_HIT' | 'SL_HIT' | 'MANUAL_EXIT' | 'EXPIRED'
    outcomeDate: null,
    exitPrice: null,
    pnlPct: null,
    notes: ''
  };

  log.unshift(entry); // newest first
  if (log.length > 500) log.length = 500; // cap at 500 entries
  saveSignalLog(log);
}

// TIER 3, ITEM 6: Signal Decay Checker
// Marks signals stale if price hasn't moved >1% above entry in 7 days
// ═══════════════════════════════════════════════════════════════
function checkSignalDecay(sym, entryPrice, scanDate) {
  try {
    const ltpCache = JSON.parse(localStorage.getItem('ltp_cache') || '{}');
    const ltp = ltpCache[sym];
    if (!ltp || !scanDate) return null;
    const daysOld = (Date.now() - new Date(scanDate).getTime()) / 86400000;
    if (daysOld < 1) return 'FRESH';
    if (daysOld >= 7 && ltp < entryPrice * 1.01) return 'STALE';
    if (daysOld >= 3 && ltp < entryPrice * 0.995) return 'WEAKENING';
    return 'ACTIVE';
  } catch { return null; }
}

// Cache LTP map after each scan for decay checking
function cacheLastLTP(ltpMap) {
  try { localStorage.setItem('ltp_cache', JSON.stringify(ltpMap)); } catch {}
}

function calcVCP(candles) {
  if (!candles || candles.length < 10) return false;
  const last5  = candles.slice(-5);
  const last10 = candles.slice(-10);
  const ltp = candles[candles.length-1].close;
  const range5  = (Math.max(...last5.map(c=>c.high))  - Math.min(...last5.map(c=>c.low)))  / ltp;
  const range10 = (Math.max(...last10.map(c=>c.high)) - Math.min(...last10.map(c=>c.low))) / ltp;
  return range5 < range10 * 0.75; // tighter recent range = contraction
}

// ── Load instrument list from Upstox /instruments CSV ──────────────────────
// Upstox provides a public CSV with all NSE instruments
// We filter to NSE_EQ (equity) only and cache for 7 days
const INST_CACHE_KEY = 'upstox_instruments_v2';
const INST_CACHE_DAYS = 7;

async function loadInstruments(forceRefresh=false) {
  // Load from localStorage cache first (skip if forceRefresh)
  if (!forceRefresh) {
    try {
      const cached = JSON.parse(localStorage.getItem(INST_CACHE_KEY) || 'null');
      if (cached && cached.ts && (Date.now() - cached.ts) < INST_CACHE_DAYS * 86400000) {
        IKEYS = cached.ikeys;
        UNIVERSE = cached.universe;
        console.log('Instruments loaded from cache:', UNIVERSE.length, 'stocks');
        return true;
      }
    } catch(e) {}
  }

  if (!S.proxyUrl) {
    showToast('⚠️ Set proxy URL in Setup first');
    return false;
  }

  // Instruments come from your Vercel proxy (/instruments endpoint)
  // The proxy fetches and decompresses the Upstox NSE.json.gz file
  // No Upstox token needed for this call — it is a public file
  showToast('📥 Downloading NSE instruments via proxy…');

  try {
    const proxyBase = S.proxyUrl.replace(/\/$/, '');
    const resp = await fetch(proxyBase + '/instruments');

    if (!resp.ok) {
      throw new Error('Proxy /instruments returned HTTP ' + resp.status);
    }

    const data = await resp.json();

    if (!data || data.status !== 'success' || !data.instruments || data.instruments.length === 0) {
      throw new Error(data.error || 'Empty response from /instruments');
    }

    console.log('Instruments received:', data.instruments.length);
    return buildAndCacheUniverse(data.instruments);

  } catch(e) {
    console.warn('Instrument load failed:', e.message);
    showToast('❌ ' + e.message.slice(0, 80));
    return false;
  }
}

function buildAndCacheUniverse(instruments) {
  const newIkeys = {};
  const newUniverse = [];

  for (const inst of instruments) {
    // Handle both API response formats
    const sym  = inst.tradingsymbol || inst.symbol;
    const key  = inst.instrument_key;
    const name = inst.name || sym;
    const type = inst.instrument_type;
    const exch = inst.exchange || inst.segment || '';
    const sec  = inst.sector_index || inst.sector || 'Other';

    if (!sym || !key) continue;
    // Only NSE equity — skip options, futures, ETFs, indices
    if (type && type !== 'EQ') continue;
    if (exch && !exch.includes('NSE')) continue;

    newIkeys[sym] = key;
    newUniverse.push({ s: sym, n: name, sec: sec });
  }

  if (Object.keys(newIkeys).length < 50) {
    console.warn('Too few instruments parsed:', Object.keys(newIkeys).length);
    showToast('⚠️ Only ' + Object.keys(newIkeys).length + ' stocks parsed — try again');
    return false;
  }

  IKEYS = newIkeys;
  UNIVERSE = newUniverse;

  localStorage.setItem(INST_CACHE_KEY, JSON.stringify({
    ts: Date.now(), ikeys: newIkeys, universe: newUniverse
  }));

  showToast('✅ ' + newUniverse.length + ' NSE stocks loaded & cached');
  console.log('Instruments cached:', newUniverse.length);
  return true;
}

// UPSTOX API CALLS

async function upstoxGet(path) {
  const base = 'https://api.upstox.com/v2';
  const headers = { 'Authorization': `Bearer ${S.token}`, 'Accept': 'application/json' };

  // Always route through proxy when set (bypasses GitHub Pages CORS block)
  if (S.proxyUrl) {
    const proxyBase = S.proxyUrl.replace(/\/$/, '');
    const url = proxyBase + '/proxy?path=' + encodeURIComponent(path);
    const r = await fetch(url, { headers });
    if (!r.ok) {
      const txt = await r.text();
      throw new Error('Proxy ' + r.status + ': ' + txt.slice(0,120));
    }
    return r.json();
  }

  // Direct call — blocked by CORS on GitHub Pages, works only locally
  const r = await fetch(base + path, { headers });
  if (!r.ok) throw new Error('Upstox ' + r.status);
  return r.json();
}

// Fetch LTP for symbols in small batches of 50
// Upstox LTP endpoint is reliable up to ~50 keys per request
// Returns { symbol: price } map
async function fetchLTP(symbols) {
  // Upstox LTP API facts (from official docs):
  // - Send: instrument_key=NSE_EQ|INE848E01016,NSE_EQ|INE669E01016  (comma-separated, ONE param)
  // - Response key format: "NSE_EQ:NHPC"  (colon + trading_symbol, NOT pipe + ISIN)
  // - Max per request: ~500 but large URLs fail; use 100 per batch safely

  const valid = symbols.filter(s => IKEYS[s]);
  if (valid.length === 0) {
    showToast('❌ 0 instrument keys — tap Refresh Instruments in Setup');
    return null;
  }

  // Build reverse map: "NSE_EQ:SYMBOL" → symbol  (matches Upstox response format)
  // Also map "NSE_EQ|ISIN" as fallback
  const rev = {};
  for (const sym of valid) {
    rev['NSE_EQ:' + sym] = sym;          // e.g. "NSE_EQ:RELIANCE" → "RELIANCE"
    rev['BSE_EQ:' + sym] = sym;          // BSE fallback
    rev[IKEYS[sym]] = sym;               // pipe+ISIN fallback
  }

  const out = {};
  const BATCH = 100;

  for (let i = 0; i < valid.length; i += BATCH) {
    const batch = valid.slice(i, i + BATCH);
    // Upstox wants comma-separated in a SINGLE instrument_key param
    const keys = batch.map(s => IKEYS[s]).join(',');
    const paramStr = 'instrument_key=' + encodeURIComponent(keys);

    try {
      const data = await upstoxGet('/market-quote/ltp?' + paramStr);
      if (!data || data.status !== 'success' || !data.data) {
        console.warn('Batch ' + i + ' failed:', JSON.stringify(data).slice(0, 100));
        continue;
      }

      // Log first batch response keys for debugging
      if (i === 0) {
        const sample = Object.keys(data.data).slice(0, 3);
        console.log('LTP response key samples:', sample);
        console.log('Sent key sample:', IKEYS[batch[0]]);
      }

      let count = 0;
      for (const [respKey, v] of Object.entries(data.data)) {
        const price = v && (v.last_price || v.ltp);
        if (!price) continue;
        const sym = rev[respKey] || rev[decodeURIComponent(respKey)];
        if (sym) { out[sym] = price; count++; }
      }
      console.log('Batch ' + (i/BATCH+1) + ': ' + count + '/' + batch.length + ' prices');
    } catch(e) {
      console.warn('Batch error:', e.message);
    }
  }

  const total = Object.keys(out).length;
  showToast('📊 Got ' + total + ' prices');
  console.log('fetchLTP done: ' + total + '/' + valid.length);
  return total > 0 ? out : null;
}

async function fetchCandles(symbol, days=280) {
  // Upstox historical candles endpoint
  // 280 calendar days ≈ 200 trading days — needed for:
  //   EMA 50  → needs 50+ trading days
  //   EMA 200 → needs 200 trading days  (swing trade trend filter)
  //   RSI 14  → needs 14+ trading days
  const key = encodeURIComponent(IKEYS[symbol]);

  // 'to' must be tomorrow to include today's candle
  const to = new Date();
  to.setDate(to.getDate() + 1);
  const toStr = to.toISOString().split('T')[0];

  // 'from' = days ago
  const from = new Date();
  from.setDate(from.getDate() - days);
  const fromStr = from.toISOString().split('T')[0];

  try {
    const data = await upstoxGet('/historical-candle/' + key + '/day/' + toStr + '/' + fromStr);
    if (data.status === 'success' && data.data && data.data.candles && data.data.candles.length > 0) {
      return data.data.candles.map(function(c) {
        return { date: c[0], open: c[1], high: c[2], low: c[3], close: c[4], volume: c[5] };
      }).reverse(); // oldest first
    }
    console.warn('Candle fetch for ' + symbol + ':', JSON.stringify(data).slice(0,100));
  } catch(e) {
    console.warn('Candle error for ' + symbol + ':', e.message);
  }
  return null;
}

// ── Fetch weekly candles for quick pre-scoring (1 year = ~52 rows) ──────
async function fetchWeeklyCandles(symbol) {
  const key = encodeURIComponent(IKEYS[symbol]);
  const to = new Date(); to.setDate(to.getDate() + 1);
  const from = new Date(); from.setFullYear(from.getFullYear() - 1);
  const toStr  = to.toISOString().split('T')[0];
  const fromStr = from.toISOString().split('T')[0];
  try {
    const data = await upstoxGet('/historical-candle/' + key + '/week/' + toStr + '/' + fromStr);
    if (data.status === 'success' && data.data && data.data.candles && data.data.candles.length > 3) {
      return data.data.candles.map(c => ({
        open: c[1], high: c[2], low: c[3], close: c[4], volume: c[5]
      })).reverse();
    }
  } catch(e) {}
  return null;
}

// ── Quick score a stock from weekly candles + LTP (no daily needed) ──────
// Returns 0-100. Higher = more likely to pass full scan.
// Policy-sensitive sectors — flag for manual review, don't hard-penalise
const POLICY_SENSITIVE_SECTORS = new Set([
  'Oil & Gas', 'Power', 'PSU Banks', 'Metals', 'Mining', 'Fertilisers',
  'Defence', 'Railways', 'Infrastructure', 'Utilities'
]);

function quickScore(wCandles, ltp) {
  // Returns { score: 0-100, flags: [], wRsi }
  // All inputs are CLOSED weekly candles — score is stable between intraday scans.
  //
  // Score normalisation:
  //   Raw components sum to max 85 (EMA:25 + Momentum:20 + Proximity:25 + Volume:15)
  //   Final score = Math.round(raw / 85 * 100) → true 0-100 scale
  //   This means "89" always means the same thing regardless of which factors fired.

  if (!wCandles || wCandles.length < 10) return { score: 0, flags: [] };

  const RAW_MAX = 85; // verified: EMA(25) + Momentum(20) + Proximity(25) + Volume(15)

  let raw = 0;
  const flags = [];
  const closes = wCandles.map(c => c.close);
  const n = closes.length;

  // ── Weekly RSI — soft reject with strong-trend override ───────────────
  // Hard reject at RSI > 78 UNLESS the stock is making new highs
  // (new 52w high = genuine breakout, not exhaustion — allow through with flag)
  let wRsi = null;
  if (n >= 15) {
    let gains = 0, losses = 0;
    for (let i = n - 14; i < n; i++) {
      const d = closes[i] - closes[i-1];
      if (d > 0) gains += d; else losses -= d;
    }
    const avgG = gains / 14, avgL = losses / 14;
    wRsi = avgL === 0 ? 100 : 100 - (100 / (1 + avgG / avgL));

    if (wRsi > 78) {
      // Check for strong-trend override: is price within 2% of 52w high?
      const high52check = Math.max(...wCandles.map(c => c.high));
      const nearNewHigh = high52check > 0 && (high52check - ltp) / high52check <= 0.02;
      if (nearNewHigh) {
        flags.push('STRONG_TREND'); // momentum breakout — allow but flag
      } else {
        flags.push('OVERBOUGHT');
        return { score: 0, flags, wRsi: Math.round(wRsi) }; // exhaustion — reject
      }
    } else if (wRsi > 70) {
      flags.push('EXTENDED'); // warn, don't reject
    }
  }

  // ── EMA trend: 25 pts total ───────────────────────────────────────────
  const ema20w = closes.slice(-Math.min(20,n)).reduce((a,b)=>a+b,0) / Math.min(20,n);
  const ema50w = closes.slice(-Math.min(50,n)).reduce((a,b)=>a+b,0) / Math.min(50,n);
  if (ltp > ema20w) raw += 15;
  if (ltp > ema50w) raw += 10;

  // ── Momentum magnitude: max 20 pts ───────────────────────────────────
  // Consideration: >=20% in 4 weeks may be late-stage, not early momentum
  // Flag as EXTENDED_MOVE above 20% — score same pts but user is warned
  if (n >= 5) {
    const move4w = (closes[n-1] - closes[n-5]) / closes[n-5] * 100;
    if (move4w >= 20) {
      raw += 20;
      flags.push('EXTENDED_MOVE'); // late-stage risk — may have run already
    } else if (move4w >= 15) raw += 20; // strong, not yet extended
    else if (move4w >= 8)    raw += 15;
    else if (move4w >= 3)    raw += 8;
    else if (move4w >= 0)    raw += 2;
    // negative momentum = 0 pts
  }

  // ── 52-week high proximity: max 25 pts — linear interpolation ────────
  // 0% from high = 25pts, 30% from high = 0pts, beyond 30% = 0pts
  const high52 = Math.max(...wCandles.map(c => c.high));
  const fromHigh = high52 > 0 ? (high52 - ltp) / high52 : 1;
  const proximityPts = fromHigh <= 0.30
    ? Math.round((1 - fromHigh / 0.30) * 25)
    : 0;
  raw += proximityPts;
  if (fromHigh <= 0.05) flags.push('NEAR_52W_HIGH');

  // ── Volume trend vs spike: max 15 pts ────────────────────────────────
  // NON-OVERLAPPING windows: weeks[-4..-1] vs weeks[-8..-5]
  // (slice(-4) = last 4 weeks; slice(-8,-4) = the 4 weeks before that)
  // Comparing non-overlapping 4-week blocks is a cleaner signal than
  // comparing a 4-week window against a 12-week window that contains it.
  const vol4avg  = wCandles.slice(-4).reduce((a,c)=>a+c.volume,0) / 4;
  const vol4prev = wCandles.slice(-8,-4).reduce((a,c)=>a+c.volume,0) / 4;
  const lastVol  = wCandles[n-1].volume;
  const volTrend = vol4prev > 0 ? vol4avg / vol4prev : 1;
  const volSpike = vol4prev > 0 ? lastVol / vol4prev : 1;

  if (volTrend >= 1.3 && volSpike < 3.0) {
    raw += 15; // sustained accumulation — strongest signal
    flags.push('VOL_TREND');
  } else if (volTrend >= 1.1) {
    raw += 8;  // mild rising volume
  } else if (volSpike >= 2.5) {
    raw += 3;  // spike only — flag it, low confidence
    flags.push('VOL_SPIKE');
  }

  // ── Normalise to true 0-100 scale ────────────────────────────────────
  const score = Math.round(Math.min(raw, RAW_MAX) / RAW_MAX * 100);

  return { score, flags, wRsi: wRsi !== null ? Math.round(wRsi) : null };
}

// ── Concurrent fetch with rate limit (max N in parallel) ─────────────────
async function fetchConcurrent(items, fetchFn, concurrency=8, onProgress=null) {
  const results = new Array(items.length).fill(null);
  let idx = 0;
  async function worker() {
    while (idx < items.length) {
      const i = idx++;
      try { results[i] = await fetchFn(items[i]); } catch(e) { results[i] = null; }
      if (onProgress) onProgress(idx, items.length);
    }
  }
  await Promise.all(Array.from({length: concurrency}, worker));
  return results;
}

// ═══════════════════════════════════════
// TECHNICAL INDICATORS (Real Math)
// ═══════════════════════════════════════
function calcEMA(closes, period) {
  if (closes.length < period) return null;
  const k = 2 / (period + 1);
  let ema = closes.slice(0, period).reduce((a,b) => a+b, 0) / period;
  for (let i = period; i < closes.length; i++) {
    ema = closes[i] * k + ema * (1 - k);
  }
  return ema;
}

function calcRSI(closes, period=14) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const diff = closes[i] - closes[i-1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  const avgGain = gains / period;
  const avgLoss = losses / period;
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

function calcMACD(closes) {
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  if (!ema12 || !ema26) return null;
  const macdLine = ema12 - ema26;
  // Signal = 9-period EMA of MACD (approximated with last values)
  return { macdLine, bullish: macdLine > 0 };
}

function calcAvgVolume(candles, days=20) {
  const recent = candles.slice(-days);
  return recent.reduce((a,c) => a + c.volume, 0) / recent.length;
}

function detectSetup(candles, ema20, ema50, rsi) {
  if (!candles || candles.length < 5) return 'Momentum';
  const last = candles[candles.length-1];
  const prev = candles[candles.length-2];
  const close = last.close;
  const high52 = Math.max(...candles.slice(-52).map(c => c.high));
  const low52  = Math.min(...candles.slice(-52).map(c => c.low));

  if (close > high52 * 0.98) return 'Breakout';
  if (close < low52 * 1.05 && rsi < 35) return 'Reversal';
  if (close > ema20 && prev.close < ema20) return 'EMA Reclaim';
  if (rsi < 40 && close > prev.close) return 'Oversold Bounce';
  if (close > ema20 && close > ema50 && rsi > 50 && rsi < 65) return 'Momentum';
  return 'Pullback';
}

function calcSLTarget(candles, ltp) {
  // Uses ATR-14 for volatility-adjusted stops — adapts to each stock's character.
  // ONGC with ATR=8 gets different levels than a volatile stock with ATR=40.
  // All levels anchored to closed candles — stable intraday.
  if (!candles || candles.length < 15) {
    const entry = candles ? candles[candles.length-1].close : ltp;
    return { sl: Math.round(entry * 0.94), target: Math.round(entry * 1.12), entry, atrBased: false };
  }

  const closedCandles = candles.slice(0, -1); // exclude today's in-progress candle
  const entry = closedCandles[closedCandles.length-1].close;

  const atr = calcATR(closedCandles, 14);

  if (atr && atr > 0) {
    // ATR-based: Stop = entry − 1.5×ATR, Target = entry + 3×ATR (2:1 RR minimum)
    const sl     = Math.round(entry - 1.5 * atr);
    const target = Math.round(entry + 3.0 * atr);

    // Sanity checks: SL must be 1–12% below, target 3–20% above
    const safeSlPct   = (entry - sl) / entry;
    const safeTargPct = (target - entry) / entry;
    if (safeSlPct >= 0.01 && safeSlPct <= 0.12 && safeTargPct >= 0.03) {
      return { sl, target, entry, atr: Math.round(atr), atrBased: true };
    }
  }

  // Fallback: swing-structure based if ATR gives unreasonable levels
  const recent10 = closedCandles.slice(-10);
  const recent20 = closedCandles.slice(-20);
  const swingLow  = Math.min(...recent10.map(c => c.low));
  const safeSl    = Math.min(Math.round(entry * 0.98), Math.max(Math.round(swingLow * 0.995), Math.round(entry * 0.88)));
  const risk      = entry - safeSl;
  const swingHigh = Math.max(...recent20.map(c => c.high));
  const target    = Math.round(Math.min(entry + risk * 2.5, Math.max(swingHigh * 1.005, entry * 1.08)));
  return { sl: safeSl, target, entry, atr: atr ? Math.round(atr) : null, atrBased: false };
}

// ═══════════════════════════════════════
// SCAN ENGINE
// ═══════════════════════════════════════
async function runScan() {
  if (S.scanning) return;
  S.scanning = true; S.stopScan = false; S.results = []; S.expanded = null;
  renderScan();

  // Load instrument universe if not already loaded (no token needed — public file)
  if (UNIVERSE.length <= 30) {
    showToast('📥 Loading instrument list…');
    await loadInstruments(false);
    renderScan();
  }

  let ltpMap = null;
  if (S.token) {
    try {
      // Only fetch LTP for Nifty500 stocks that exist in our universe
      // This keeps the request count low (~10 batches of 50 = ~500 symbols)
      const nifty500inUniverse = UNIVERSE.filter(u => NIFTY500_SYMBOLS.has(u.s));
      const ltpSymbols = nifty500inUniverse.length >= 50
        ? nifty500inUniverse.map(u => u.s)
        : UNIVERSE.map(u => u.s); // fallback to all if Nifty500 not matched

      showToast('📊 Fetching prices for ' + ltpSymbols.length + ' stocks…');
      ltpMap = await fetchLTP(ltpSymbols);
    } catch(e) {
      console.error('LTP fetch failed:', e.message);
      S.scanning = false; S.demoMode = true; S.results = [];
      renderScan();
      showToast('❌ API Error: ' + e.message.slice(0,50));
      return;
    }
  }

  if (!ltpMap) {
    S.scanning = false; S.demoMode = true;
    S.results = [];
    renderScan();
    if (S.token) {
      // Token exists but LTP returned nothing — likely token expired or rate limit
      showToast('❌ LTP fetch returned 0 prices — token may be expired');
    } else {
      showToast('⚠️ Connect Upstox in Setup for real data');
    }
    return;
  }

  S.demoMode = false;

  // ── PASS 1: Nifty 500 pool with valid LTP ────────────────────────────
  const nifty500pool = UNIVERSE.filter(u => {
    if (!NIFTY500_SYMBOLS.has(u.s)) return false;
    const p = ltpMap[u.s];
    return p && p >= 50 && p <= 25000;
  });
  const pool = nifty500pool.length >= 50 ? nifty500pool
    : UNIVERSE.filter(u => { const p = ltpMap[u.s]; return p && p >= 50 && p <= 25000; });

  showToast('⚡ Pass 1: scoring ' + pool.length + ' stocks via weekly candles…');
  renderScan();

  // Fetch weekly candles for ALL pool stocks concurrently (8 at a time)
  // Weekly = ~52 rows/stock, very fast to fetch and process
  let lastProg = 0;
  const weeklyData = await fetchConcurrent(
    pool,
    stock => fetchWeeklyCandles(stock.s),
    8,
    (done, total) => {
      if (done - lastProg >= 20 || done === total) {
        lastProg = done;
        showToast('⚡ Pass 1: ' + done + '/' + total + ' weekly scans done…');
      }
    }
  );

  // Quick-score all stocks from weekly data + LTP
  const scored = pool.map((stock, i) => {
    const qs = quickScore(weeklyData[i], ltpMap[stock.s]);
    return {
      ...stock,
      ltp: ltpMap[stock.s],
      wScore: qs.score || 0,
      wFlags: qs.flags || [],
      wRsi: qs.wRsi || null,
      wCandles: weeklyData[i]
    };
  }).filter(s => s.wScore >= 20)    // drop obvious non-starters (incl. overbought = 0)
    .sort((a, b) => b.wScore - a.wScore);  // best first

  showToast('⚡ Pass 1 done: ' + scored.length + ' candidates → Pass 2 deep scan top 80');

  // ── PASS 2: Deep daily candle scan on top 80 scored stocks ───────────
  const DEEP_CAP = 80;
  const candidates = scored.slice(0, DEEP_CAP);

  // Nifty return for relative strength
  let niftyReturn = null;
  try {
    const tc = JSON.parse(localStorage.getItem('ticker_cache') || '{}');
    if (tc.nifty && tc.niftyPrev) niftyReturn = (tc.nifty - tc.niftyPrev) / tc.niftyPrev * 100;
  } catch(e) {}

  const qualified = [];
  let processed = 0;
  const brain = loadBrain();

  // Deep scan candidates with daily candles
  for (const stock of candidates) {
    const ltp = ltpMap[stock.s];
    if (!ltp) continue;
    processed++;
    if (S.stopScan) { showToast('⏹ Scan stopped · ' + qualified.length + ' setups found'); break; }
    if (processed % 10 === 0) {
      showToast('📊 ' + processed + '/' + candidates.length + ' done · ' + qualified.length + ' setups found');
      renderScan();
    }

    // Per-stock 10s timeout — prevents single slow stock from hanging scan
    let candles = null;
    try {
      const candlePromise = fetchCandles(stock.s, 280); // 280 cal days ≈ 200 trading days
      const timeoutPromise = new Promise(res => setTimeout(() => res(null), 10000));
      candles = await Promise.race([candlePromise, timeoutPromise]);
    } catch(e) { continue; }
    if (!candles || candles.length < 20) continue;

    const closes  = candles.map(c => c.close);
    const rsi     = calcRSI(closes, 14);
    const ema20   = calcEMA(closes, 20);
    const ema50   = calcEMA(closes, 50);
    const ema200  = calcEMA(closes, 200); // long-term trend filter
    const macd    = calcMACD(closes);
    const avgVol  = calcAvgVolume(candles, 20);
    const lastVol = candles[candles.length-1].volume;
    const volMult = avgVol > 0 ? lastVol / avgVol : 1;

    if (!rsi || !ema20) continue;

    // ── Evaluate each filter independently ───────────────────────────
    const rsiOk    = rsi >= 25 && rsi <= 75;          // wider band — catches more setups
    const emaOk    = ltp > ema20 * 0.98;              // within 2% of EMA20 counts too
    const ema200Ok = !ema200 || ltp > ema200 * 0.97;  // allow slight dip below EMA200
    const macdOk   = macd && macd.bullish;            // MACD line positive
    const volOk    = volMult >= 1.0;                  // any volume (remove surge requirement)

    // Count how many filters pass
    const filterScore = [rsiOk, emaOk, ema200Ok, macdOk, volOk].filter(Boolean).length;

    // Need at least 3/5 filters to qualify as a WATCH, 4/5 for BUY consideration
    if (filterScore < 3) continue;

    const slData = calcSLTarget(candles, ltp);
    const { sl, target, entry } = slData;
    const entryPrice = entry || ltp; // stable entry from closed candle
    const upsidePct = (target - entryPrice) / entryPrice * 100;
    const riskPct   = (entryPrice - sl) / entryPrice * 100;
    const rr        = riskPct > 0 ? upsidePct / riskPct : 0;
    if (upsidePct < 5 || rr < 1.2) continue;

    const setup          = detectSetup(candles, ema20, ema50, rsi);
    const vcp            = calcVCP(candles);
    const vcpTight       = calcVCPTightness(stock.wCandles);
    const rs             = calcRelativeStrength(candles, niftyReturn);
    const liquidity      = calcLiquidity(candles);
    const stageInfo      = calcStageAnalysis(stock.wCandles);
    const falseBrk       = checkFalseBreakout(candles);
    const mtf            = calcMTFAlignment(stock.wCandles, candles, stageInfo, rsi, ema20, ema50);
    const trendCons      = calcTrendConsistency(stock.wCandles);

    // ── Liquidity floor: ₹10 crore/day minimum ───────────────────────
    // Below this, you cannot reliably exit — skip entirely
    if (liquidity !== null && liquidity < 10) continue;

    // ── Stage filter (Tier 1, item 1) ────────────────────────────────
    // Reject Stage 3 (distribution) and Stage 4 (decline) outright
    // Stage 1 (base) and 2 (markup) are valid entries
    if (stageInfo && (stageInfo.stage === 3 || stageInfo.stage === 4)) continue;
    // Additional: 20w EMA must be rising for Stage 2 quality
    const stageWarning = stageInfo && !stageInfo.rising20 ? 'EMA_FLATTENING' : null;

    // ── Daily RSI cap ─────────────────────────────────────────────────
    if (rsi > 78) continue;

    // ── Resistance zones + gaps (need entryPrice from SL calc) ─────────
    const resistInfo = detectResistanceZones(stock.wCandles, entryPrice);
    const gapInfo    = detectGaps(candles, entryPrice, target);

    // Build signals map for conviction scoring
    const signals = {};
    let conviction = calcConvictionScore(
      signals, ltp, candles, rsi, ema20, ema50, volMult, rr, niftyReturn
    );

    // ── VCP tightness bonus — max +10 conviction pts ────────────────
    conviction = Math.min(100, conviction + vcpTight.score * 0.67);

    // ── MTF alignment bonus — +8 pts when daily confirms weekly ──────
    if (mtf.aligned) conviction = Math.min(100, conviction + 8);

    // ── Trend consistency bonus/penalty ──────────────────────────────
    if (trendCons.quality === 'Consistent') conviction = Math.min(100, conviction + 5);
    if (trendCons.quality === 'Choppy')     conviction = Math.max(0,   conviction - 8);

    // ── Resistance zone penalty — approaching major resistance ────────
    if (resistInfo.approaching) conviction = Math.max(0, conviction - 7);

    if (conviction < 25) continue;

    // Brain-based sector penalty
    const swr = getSectorWinRate(stock.sec);
    let finalConviction = swr !== null && swr < 35
      ? Math.round(conviction * 0.8)
      : Math.round(conviction);

    // False breakout penalty: −10 pts (warn but don't outright reject)
    if (falseBrk) finalConviction = Math.max(25, finalConviction - 10);

    const isPolicySensitive = POLICY_SENSITIVE_SECTORS.has(stock.sec);
    const weeklyFlags = stock.wFlags || [];

    // Only show BUY and STRONG BUY
    if (finalConviction < 55) continue;

    // Setup win rate from our history
    const setupWr = getSetupWinRate(setup);

    const verdict = finalConviction >= 75 ? 'STRONG BUY'
                  : finalConviction >= 55 ? 'BUY'
                  : 'WATCH';

    qualified.push({
      sym: stock.s, name: stock.n, sector: stock.sec,
      ltp: Math.round(ltp), entry: Math.round(entryPrice),
      target, sl,
      atr: slData.atr || null, atrBased: slData.atrBased || false,
      upsidePct: upsidePct.toFixed(1),
      riskPct: riskPct.toFixed(1),
      rr: rr.toFixed(1),
      rsi: rsi.toFixed(1),
      ema20: Math.round(ema20),
      ema50: ema50 ? Math.round(ema50) : null,
      ema200: ema200 ? Math.round(ema200) : null,
      macdBull: !!(macd && macd.bullish),
      volMult: volMult.toFixed(1),
      vcp, vcpQuality: vcpTight.quality, vcpContractions: vcpTight.contractions,
      rs: rs !== null ? rs.toFixed(1) : null,
      liquidity: liquidity ? liquidity.toFixed(1) : null,
      stage: stageInfo ? stageInfo.stage : null,
      stageWarning,
      falseBrk,
      setup, verdict,
      conviction: finalConviction,
      setupWr,
      signals,
      weeklyFlags,
      isPolicySensitive,
      wScore: stock.wScore,
      mtfAligned: mtf.aligned, mtfReasons: mtf.reasons,
      trendConsistency: trendCons.quality, weeksAbove: trendCons.weeksAbove,
      resistanceZones: resistInfo.zones, resistanceApproaching: resistInfo.approaching,
      nearestResistance: resistInfo.nearestAbove,
      clearAbove: resistInfo.clearAbove,
      gapsAbove: gapInfo.gapsAbove, gapsBelow: gapInfo.gapsBelow,
      aiAnalysis: null,
      scanTime: new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
      candles: candles.slice(-30),
    });
  }

  // Cache LTP for signal decay checking
  cacheLastLTP(ltpMap);

  // Auto-log all signals to outcome tracker
  qualified.forEach(r => autoLogSignal(r));

  // Sort by conviction score (proprietary) not just R:R
  // Gap 2: RS percentile across this scan batch (honest: not market-wide)
  const rsValues = qualified.map(r => parseFloat(r.rs||0)).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const rsP80 = rsValues.length ? rsValues[Math.floor(rsValues.length*0.80)] : 0;
  qualified.forEach(r => {
    const rv = parseFloat(r.rs||0);
    r.rsPercentile = rsValues.length > 1
      ? Math.round(rsValues.filter(v=>v<=rv).length/rsValues.length*100) : 50;
    r.rsTopQuintile = rv >= rsP80;
  });

  // Sort: STRONG BUY first, then by conviction
  qualified.sort((a,b) => {
    if (a.verdict !== b.verdict) return (a.verdict==='STRONG BUY'?0:1)-(b.verdict==='STRONG BUY'?0:1);
    return b.conviction - a.conviction;
  });
  S.results = qualified;
  S.scanning = false;
  renderScan();
  updateTicker();
  showToast('✅ ' + S.results.length + ' setups found · sorted by AI conviction');
  updatePortfolioPrices();
  checkExitAlerts();
}

// ── Ticker cache keys in localStorage ──────────────────
var TCACHE = 'ticker_cache';

function loadTickerCache() {
  // Restore last known values from localStorage immediately on load
  try {
    var cached = JSON.parse(localStorage.getItem(TCACHE) || 'null');
    if (!cached) return;
    var isMarketHours = isMarketOpen();
    var label = isMarketHours ? 'LIVE' : 'AT CLOSE';

    function setEl(id, val, decimals, colorFn) {
      var el = document.getElementById(id);
      if (el && val) {
        el.textContent = typeof val === 'number'
          ? val.toLocaleString('en-IN', {maximumFractionDigits: decimals || 0})
          : val;
        if (colorFn) el.style.color = colorFn(val);
      }
    }
    setEl('t-nifty',  cached.nifty,  0, function(v){ return v >= (cached.niftyPrev||v) ? 'var(--green)' : 'var(--red)'; });
    setEl('t-bn',     cached.bn,     0, function(v){ return v >= (cached.bnPrev||v)    ? 'var(--green)' : 'var(--red)'; });
    setEl('t-sx',     cached.sx,     0, function(v){ return v >= (cached.sxPrev||v)    ? 'var(--green)' : 'var(--red)'; });
    setEl('t-vix',    cached.vix,    2, function(v){ return v > 17 ? 'var(--red)' : v > 13 ? 'var(--gold)' : 'var(--green)'; });
    setEl('t-bias',   cached.bias,   0, function(v){ return v === 'BULLISH' ? 'var(--green)' : 'var(--red)'; });

    var timeLabel = cached.time ? ' · ' + cached.time : '';
    document.getElementById('h-sub').textContent = (isMarketHours ? '🟢 ' : '🕐 ') + label + timeLabel;
  } catch(e) {}
}

function isMarketOpen() {
  var now = new Date();
  // IST = UTC + 5:30
  var istOffset = 5.5 * 60 * 60 * 1000;
  var ist = new Date(now.getTime() + istOffset);
  var day = ist.getUTCDay(); // 0=Sun, 6=Sat
  var h = ist.getUTCHours();
  var m = ist.getUTCMinutes();
  var mins = h * 60 + m;
  // Market open Mon–Fri 9:15 AM – 3:30 PM IST
  return day >= 1 && day <= 5 && mins >= 555 && mins <= 930;
}

async function updateTicker() {
  // First restore cached values so ticker is never blank
  loadTickerCache();

  if (!S.token) {
    document.getElementById('h-sub').textContent = '🟡 DEMO · ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    return;
  }

  try {
    var indexKeys = 'NSE_INDEX|Nifty 50,NSE_INDEX|Nifty Bank,NSE_INDEX|India VIX,BSE_INDEX|SENSEX';
    var data = await upstoxGet('/market-quote/ltp?instrument_key=' + encodeURIComponent(indexKeys));

    if (!data || data.status !== 'success') {
      // API failed (market closed / Upstox returning error) — cached values already shown
      var isOpen = isMarketOpen();
      document.getElementById('h-sub').textContent = (isOpen ? '⚠️ API Error' : '🕐 Market Closed') + ' · ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      return;
    }

    var d = data.data;

    // Upstox may return keys as-is OR URL-encoded (e.g. NSE_INDEX%7CNifty+50)
    // So we find each index by searching for its name anywhere in the key string
    function findByName(obj, namePart) {
      for (var k in obj) {
        var decoded = decodeURIComponent(k.replace(/\+/g, ' '));
        if (decoded.indexOf(namePart) !== -1) return obj[k].last_price || obj[k].ltp || null;
      }
      return null;
    }

    // Also log the raw keys so we can debug if needed
    console.log('Ticker raw keys:', Object.keys(d));

    var nifty = findByName(d, 'Nifty 50');
    var bn    = findByName(d, 'Nifty Bank');
    var vix   = findByName(d, 'India VIX');
    var sx    = findByName(d, 'SENSEX');

    console.log('Parsed ticker:', {nifty: nifty, bn: bn, vix: vix, sx: sx});

    // Load previous cached values for colour comparison
    var prev = JSON.parse(localStorage.getItem(TCACHE) || '{}');

    function setTicker(id, val, decimals, colorFn) {
      var el = document.getElementById(id);
      if (el && val) {
        el.textContent = val.toLocaleString('en-IN', {maximumFractionDigits: decimals || 0});
        if (colorFn) el.style.color = colorFn(val);
      }
    }

    setTicker('t-nifty', nifty, 0, function(v){ return v >= (prev.nifty||v) ? 'var(--green)' : 'var(--red)'; });
    setTicker('t-bn',    bn,    0, function(v){ return v >= (prev.bn||v)    ? 'var(--green)' : 'var(--red)'; });
    setTicker('t-sx',    sx,    0, function(v){ return v >= (prev.sx||v)    ? 'var(--green)' : 'var(--red)'; });

    if (vix) {
      var vel = document.getElementById('t-vix');
      if (vel) {
        vel.textContent = vix.toFixed(2);
        vel.style.color = vix > 17 ? 'var(--red)' : vix > 13 ? 'var(--gold)' : 'var(--green)';
      }
    }

    var bias = (nifty && prev.nifty) ? (nifty >= prev.nifty ? 'BULLISH' : 'BEARISH') : 'NEUTRAL';
    var bel = document.getElementById('t-bias');
    if (bel) {
      bel.textContent = bias;

      sx: sx,       sxPrev: prev.sx,

    }));

  } catch(e) {
    console.warn('Ticker fetch failed:', e.message);

}

// CLAUDE AI ANALYSIS — per setup
// ═══════════════════════════════════════
const CLAUDE_MODEL = 'claude-sonnet-4-20250514';

async function getClaudeAnalysis(result) {
  const brain = loadBrain();
  const swr = brain.setupStats[result.setup];
  const secWr = brain.sectorStats[result.sector];
  const swrText = swr ? (swr.wins+swr.losses) + ' trades, ' + Math.round(swr.wins/(swr.wins+swr.losses)*100) + '% win rate' : 'no history yet';
  const secText = secWr ? Math.round(secWr.wins/(secWr.wins+secWr.losses)*100) + '% win rate in ' + result.sector : 'no sector history';

  const prompt = `You are an expert NSE swing trader. Analyse this setup concisely for a retail swing trader.

STOCK: ${result.sym} (${result.name}) — ${result.sector}
SETUP TYPE: ${result.setup}
LTP: ₹${result.ltp} | Entry: ₹${result.entry} | Target: ₹${result.target} | SL: ₹${result.sl}
RSI(14): ${result.rsi} | EMA20: ₹${result.ema20} | EMA50: ${result.ema50 || 'N/A'}
MACD: ${result.macdBull ? 'Bullish' : 'Bearish'} | Volume: ${result.volMult}x avg
Relative Strength vs Nifty (20d): ${result.rs !== null ? result.rs + '%' : 'N/A'}
VCP Pattern: ${result.vcp ? 'YES — volatility contraction detected' : 'No'}
R:R Ratio: ${result.rr}x | Upside: ${result.upsidePct}%
Conviction Score: ${result.conviction}/100
Your personal history — ${result.setup} setups: ${swrText}
Your ${result.sector} sector: ${secText}

Give a 3-sentence analysis:
1. Why this setup is interesting (price action + indicators)
2. Key risk or reason it could fail
3. Specific recommendation (hold period, partial booking level)
Keep it direct, no fluff. Use ₹ for prices.`;

  try {
    // Claude API must go through our Vercel proxy to avoid CORS block
    const proxyBase = S.proxyUrl ? S.proxyUrl.replace(/\/$/, '') : null;
    if (!proxyBase) return 'Set proxy URL in Setup to enable AI analysis.';

    const resp = await fetch(proxyBase + '/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) {
      const err = await resp.text();
      return 'AI analysis failed (HTTP ' + resp.status + '): ' + err.slice(0, 80);
    }
    const data = await resp.json();
    return data.content && data.content[0] ? data.content[0].text : 'Analysis unavailable.';
  } catch(e) {
    return 'Analysis unavailable: ' + e.message;
  }
}

// ═══════════════════════════════════════
// EXIT ALERTS — check all open trades
// ═══════════════════════════════════════
function checkExitAlerts() {
  const alerts = [];
  for (const t of S.trades) {
    if (t.status !== 'open') continue;
    const cmp = t.cmp || t.buyPrice;
    const pnlPct = (cmp - t.buyPrice) / t.buyPrice * 100;
    const toTarget = (t.target - cmp) / t.target * 100;

    if (cmp >= t.target) {
      alerts.push({ id: t.id, sym: t.sym, type: 'target',
        msg: t.sym + ' TARGET HIT! +' + pnlPct.toFixed(1) + '% — consider booking profits' });
    } else if (cmp <= t.sl) {
      alerts.push({ id: t.id, sym: t.sym, type: 'sl',
        msg: t.sym + ' SL BREACHED — ' + pnlPct.toFixed(1) + '% — exit recommended' });
    } else if (pnlPct >= 7 && toTarget <= 3) {
      alerts.push({ id: t.id, sym: t.sym, type: 'trail',
        msg: t.sym + ' up ' + pnlPct.toFixed(1) + '% — trail stop loss to entry' });
    } else if (pnlPct >= 5) {
      // Trail stop loss to cost + 1%
      alerts.push({ id: t.id, sym: t.sym, type: 'trail',
        msg: t.sym + ' up ' + pnlPct.toFixed(1) + '% — trail SL to ₹' + Math.round(t.buyPrice * 1.01) });
    }
  }
  S.exitAlerts = alerts;
  if (alerts.length > 0) {
    showToast('🔔 ' + alerts.length + ' exit alert' + (alerts.length > 1 ? 's' : '') + ' — check Portfolio');
    if (Notification.permission === 'granted') {
      alerts.forEach(a => {
        try { new Notification('SwingScanner', { body: a.msg, icon: '/manifest.json' }); } catch(e) {}
      });
    }
  }
}
