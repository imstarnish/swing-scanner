// ONE-TAP ORDER PLACEMENT — Upstox API
// ═══════════════════════════════════════
async function placeOrder(sym, price, qty, sl, target) {
  if (!S.token) { showToast('❌ Connect Upstox first'); return; }
  if (!qty || qty < 1) { showToast('❌ Enter valid quantity'); return; }

  const ik = IKEYS[sym];
  if (!ik) { showToast('❌ Instrument key not found for ' + sym); return; }

  // Build order payload for Upstox v2 orders API
  const orderPayload = {
    quantity: parseInt(qty),
    product: 'D',           // Delivery (CNC) for swing trading
    validity: 'DAY',
    price: parseFloat(price),
    tag: 'SwingScanner',
    instrument_token: ik,
    order_type: 'LIMIT',
    transaction_type: 'BUY',
    disclosed_quantity: 0,
    trigger_price: 0,
    is_amo: false
  };

  try {
    showToast('📤 Placing order for ' + sym + '…');
    const data = await upstoxGet_POST('/order/place', orderPayload);
    if (data.status === 'success') {
      const orderId = data.data && data.data.order_id;
      showToast('✅ Order placed! ID: ' + (orderId || 'N/A'));
      // Auto-add to portfolio
      const trade = {
        id: Date.now().toString(),
        sym, buyPrice: parseFloat(price), qty: parseInt(qty),
        buyDate: new Date().toISOString().split('T')[0],
        target: parseInt(target), sl: parseInt(sl),
        cmp: parseFloat(price), status: 'open',
        upstoxOrderId: orderId,
        setup: S.results.find(r => r.sym === sym)?.setup || 'Manual',
        sector: UNIVERSE.find(u => u.s === sym)?.sec || 'Other',
        signals: S.results.find(r => r.sym === sym)?.signals || {},
      };
      S.trades.push(trade);
      saveTrades();
      showToast('✅ ' + sym + ' added to portfolio automatically');
    } else {
      showToast('❌ Order failed: ' + (data.message || JSON.stringify(data).slice(0,60)));
      console.error('Order error:', data);
    }
  } catch(e) {
    showToast('❌ Order error: ' + e.message.slice(0,50));
  }
}

// POST helper for order placement
async function upstoxGet_POST(path, body) {
  const base = 'https://api.upstox.com/v2';
  const headers = {
    'Authorization': 'Bearer ' + S.token,
    'Accept': 'application/json',
    'Content-Type': 'application/json'
  };
  if (S.proxyUrl) {
    const proxyBase = S.proxyUrl.replace(/\/$/, '');
    const r = await fetch(proxyBase + '/proxy?path=' + encodeURIComponent(path), {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });
    return r.json();
  }
  const r = await fetch(base + path, { method: 'POST', headers, body: JSON.stringify(body) });
  return r.json();
}

function renderPort() {
  const pg = document.getElementById('page-port');
  const open = S.trades.filter(t=>t.status==='open');

  // Calculate summary
  let totalInvested = 0, totalCurrent = 0, totalPnl = 0;
  open.forEach(t => {
    const invested = t.buyPrice * t.qty;
    const current  = (t.cmp || t.buyPrice) * t.qty;
    const pnl      = current - invested;
    totalInvested += invested;
    totalCurrent  += current;
    totalPnl      += pnl;
  });
  const totalPct = totalInvested > 0 ? ((totalPnl / totalInvested) * 100).toFixed(2) : '0.00';

  pg.innerHTML = `
    <div class="port-summary">
      <div class="ps-card">
        <div class="ps-label">INVESTED</div>
        <div class="ps-val" style="font-size:16px">₹${Math.round(totalInvested).toLocaleString('en-IN')}</div>
        <div class="ps-sub">${open.length} open trades</div>
      </div>
      <div class="ps-card">
        <div class="ps-label">TOTAL P&L</div>
        <div class="ps-val" style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">
          ${totalPnl>=0?'+':''}₹${Math.round(Math.abs(totalPnl)).toLocaleString('en-IN')}
        </div>
        <div class="ps-sub" style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">
          ${totalPnl>=0?'+':''}${totalPct}%
        </div>
      </div>
    </div>

    ${S.exitAlerts && S.exitAlerts.length > 0 ? S.exitAlerts.map(a => `
      <div class="exit-alert ${a.type}" onclick="toggleExp('port_${a.id}'); switchTab('port')">
        ${a.type==='target'?'🎯':a.type==='sl'?'🔴':'📈'} ${a.msg}
      </div>`).join('') : ''}

    <button class="scan-btn" style="margin-bottom:14px" onclick="openAddManualModal()">
      + ADD TRADE MANUALLY
    </button>

    ${open.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">💼</div>
        <div class="empty-t">No open trades</div>
        <div class="empty-s">Add a trade from Scanner results or manually above</div>
      </div>
    ` : open.map((t,i) => renderTradeCard(t,i)).join('')}
  `;
}

function renderTradeCard(t, i) {
  const cmp     = t.cmp || t.buyPrice;
  const pnl     = (cmp - t.buyPrice) * t.qty;
  const pnlPct  = ((cmp - t.buyPrice) / t.buyPrice * 100).toFixed(2);
  const isProfit = pnl >= 0;
  const targetHit = cmp >= t.target;
  const slHit     = cmp <= t.sl;
  const cls = targetHit ? 'target-hit' : slHit ? 'loss' : isProfit ? 'profit' : 'loss';
  const prog = Math.min(100, Math.max(0,((cmp - t.sl)/(t.target - t.sl)*100))).toFixed(0);
  const isExp = S.expanded === ('port_'+t.id);

  return `
    <div class="trade-card ${cls} fade-up" style="animation-delay:${i*0.05}s">
      <div class="tc-head" onclick="toggleExp('port_${t.id}')">
        <div class="tc-row1">
          <div>
            <div class="tc-sym">${t.sym}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${t.qty} qty · Bought ₹${t.buyPrice} · ${t.buyDate}</div>
          </div>
          <div>
            <div class="tc-pnl" style="color:${isProfit?'var(--green)':'var(--red)'}">
              ${isProfit?'+':''}₹${Math.round(Math.abs(pnl)).toLocaleString('en-IN')}
            </div>
            <div style="font-size:10px;text-align:right;color:${isProfit?'var(--green)':'var(--red)'}">
              ${isProfit?'+':''}${pnlPct}%
            </div>
          </div>
        </div>
        <div class="tc-metrics">
          <div><div class="met-label">CMP</div><div class="met-val">₹${cmp.toLocaleString('en-IN',{maximumFractionDigits:1})}</div></div>
          <div><div class="met-label">TARGET</div><div class="met-val c-green">₹${t.target.toLocaleString('en-IN')}</div></div>
          <div><div class="met-label">STOP LOSS</div><div class="met-val c-red">₹${t.sl.toLocaleString('en-IN')}</div></div>
        </div>
        ${targetHit ? '<div style="font-size:10px;color:var(--gold);margin-top:7px;font-weight:700">🎯 TARGET REACHED — Consider booking profits</div>' : ''}
        ${slHit ? '<div style="font-size:10px;color:var(--red);margin-top:7px;font-weight:700">🔴 STOP LOSS HIT — Consider exiting</div>' : ''}
      </div>
      ${isExp ? `
      <div class="tc-detail">
        <div class="prog-wrap">
          <div class="prog-labels"><span>SL ₹${t.sl}</span><span>CMP</span><span>T ₹${t.target}</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
        </div>
        <div class="ind-grid" style="margin-bottom:12px">
          <div class="ind-box"><div class="ind-label">INVESTED</div><div class="ind-val">₹${Math.round(t.buyPrice*t.qty).toLocaleString('en-IN')}</div></div>
          <div class="ind-box"><div class="ind-label">CURRENT</div><div class="ind-val">₹${Math.round(cmp*t.qty).toLocaleString('en-IN')}</div></div>
          <div class="ind-box"><div class="ind-label">UPSIDE LEFT</div><div class="ind-val c-green">+${((t.target-cmp)/cmp*100).toFixed(1)}%</div></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-exit" onclick="exitTrade('${t.id}',${cmp})">🚪 Exit at CMP ₹${cmp.toLocaleString('en-IN',{maximumFractionDigits:1})}</button>
          <button class="btn-del" onclick="deleteTrade('${t.id}')">🗑</button>
        </div>
      </div>` : ''}
    </div>`;
}

function renderBrainPanel() {
  const brain = loadBrain();
  const setupEntries = Object.entries(brain.setupStats).filter(function(_ref){var v=_ref[1];return v.wins+v.losses>=1;});
  const sectorEntries = Object.entries(brain.sectorStats).filter(function(_ref){var v=_ref[1];return v.wins+v.losses>=1;});
  const weights = brain.weights;
  if (setupEntries.length === 0 && sectorEntries.length === 0) return '';

  function wrRow(label, st) {
    var wr = Math.round(st.wins/(st.wins+st.losses)*100);
    var col = wr>=60 ? 'var(--green)' : wr>=40 ? 'var(--gold)' : 'var(--red)';
    return '<div class="wr-row"><div class="wr-name">'+label+'</div>'
      +'<div class="wr-bar-wrap"><div class="wr-bar" style="width:'+wr+'%;background:'+col+'"></div></div>'
      +'<div class="wr-pct" style="color:'+col+'">'+wr+'%</div>'
      +'<div class="wr-count">'+(st.wins+st.losses)+'T</div></div>';
  }

  var setupRows   = setupEntries.map(function(e){return wrRow(e[0],e[1]);}).join('');
  var sectorRows  = sectorEntries.map(function(e){return wrRow(e[0],e[1]);}).join('');
  var weightRows  = Object.entries(weights).map(function(e){
    var sig=e[0], w=e[1];
    return '<div class="weight-row">'
      +'<div class="w-label">'+w.desc+'</div>'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<div class="w-bar"><div class="w-fill" style="width:'+w.weight+'%"></div></div>'
      +'<div class="w-val">'+w.weight+'%</div></div></div>';
  }).join('');

  return '<div class="brain-card" style="margin-bottom:14px">'
    +'<div class="brain-title" style="color:var(--purple)">🧠 STRATEGY BRAIN</div>'
    +'<div style="font-size:10px;color:var(--muted);margin-bottom:12px;line-height:1.6">'
    +'Learns from every closed trade. Signal weights shift based on what actually predicted your wins.</div>'
    +(setupRows ? '<div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:8px">SETUP WIN RATES</div>'+setupRows : '')
    +(sectorRows ? '<div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin:12px 0 8px">SECTOR WIN RATES</div>'+sectorRows : '')
    +'<div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin:12px 0 8px">ADAPTIVE SIGNAL WEIGHTS</div>'
    +weightRows
    +'<button style="width:100%;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:Manrope,sans-serif;font-size:10px;cursor:pointer;margin-top:12px"'
    +' onclick="if(confirm(String.fromCharCode(82,101,115,101,116,32,98,114,97,105,110,63))){localStorage.removeItem(String.fromCharCode(115,116,114,97,116,101,103,121,95,98,114,97,105,110,95,118,49));showToast(String.fromCharCode(66,114,97,105,110,32,114,101,115,101,116));renderHist()}">'
    +'Reset Brain</button>'
    +'</div>';
}

// DIAGNOSTIC — tests proxy + token + candles
// ═══════════════════════════════════════
async function runDiagnostic() {
  const panel = document.getElementById('diag-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="setup-card"><div class="setup-title">🔬 RUNNING DIAGNOSTICS...</div><div id="diag-log" style="font-size:11px;font-family:JetBrains Mono,monospace;line-height:2;color:var(--muted)"></div></div>';
  const log = document.getElementById('diag-log');

  function addLog(msg, color) {
    const d = document.createElement('div');
    d.style.color = color || 'var(--text)';
    d.textContent = msg;
    log.appendChild(d);
  }

  addLog('1. Checking proxy URL...', 'var(--muted)');
  if (!S.proxyUrl) { addLog('   ❌ No proxy URL saved', 'var(--red)'); return; }
  addLog('   ✅ Proxy URL: ' + S.proxyUrl, 'var(--green)');

  addLog('2. Testing proxy health...', 'var(--muted)');
  try {
    const proxyBase = S.proxyUrl.replace(/\/$/, '');
    const r = await fetch(proxyBase + '/proxy', { method: 'GET' });
    if (!r.ok) {
      addLog('   ❌ Proxy returned HTTP ' + r.status, 'var(--red)');
      addLog('   → Redeploy the Vercel project and try again', 'var(--muted)');
      return;
    }
    let d = {};
    try { d = await r.json(); } catch(e) {
      addLog('   ⚠️ Proxy responded but returned non-JSON — may still work', 'var(--gold)');
    }
    if (d.status && d.status.toLowerCase().includes('running')) {
      addLog('   ✅ Proxy is live: ' + d.status, 'var(--green)');
    } else {
      addLog('   ✅ Proxy responded (HTTP 200) — treating as healthy', 'var(--green)');
    }
  } catch(e) {
    addLog('   ❌ Proxy unreachable: ' + e.message, 'var(--red)');
    addLog('   → Make sure your Vercel URL is correct (no trailing slash issues)', 'var(--muted)');
    addLog('   → Test URL directly: ' + S.proxyUrl.replace(/\/$/, '') + '/proxy', 'var(--muted)');
    return;
  }

  addLog('3. Testing Upstox token (LTP call)...', 'var(--muted)');
  try {
    const key = encodeURIComponent('NSE_EQ|INE002A01018');
    const data = await upstoxGet('/market-quote/ltp?instrument_key=' + key);
    if (data.status === 'success') {
      const price = Object.values(data.data)[0]?.last_price;
      addLog('   ✅ Token valid! RELIANCE LTP = ₹' + price, 'var(--green)');
    } else {
      addLog('   ❌ Token failed: ' + JSON.stringify(data).slice(0,100), 'var(--red)');
      addLog('   → Token may be expired. Generate a new one today.', 'var(--gold)');
      return;
    }
  } catch(e) {
    addLog('   ❌ LTP call error: ' + e.message, 'var(--red)');
    return;
  }

  addLog('4. Testing index data (Nifty)...', 'var(--muted)');
  try {
    const key = encodeURIComponent('NSE_INDEX|Nifty 50');
    const data = await upstoxGet('/market-quote/ltp?instrument_key=' + key);
    if (data.status === 'success') {
      const nifty = Object.values(data.data)[0]?.last_price;
      addLog('   ✅ Nifty 50 = ' + nifty, 'var(--green)');
    } else {
      addLog('   ⚠️ Index data failed: ' + JSON.stringify(data).slice(0,80), 'var(--gold)');
    }
  } catch(e) {
    addLog('   ⚠️ Index call error: ' + e.message, 'var(--gold)');
  }

  addLog('5. Testing historical candles (RELIANCE 10 days)...', 'var(--muted)');
  try {
    const candles = await fetchCandles('RELIANCE', 10);
    if (candles && candles.length > 0) {
      addLog('   ✅ Got ' + candles.length + ' candles. Last close: ₹' + candles[candles.length-1].close, 'var(--green)');
      addLog('', '');
      addLog('✅ ALL SYSTEMS OK — Tap Run Real Scan now!', 'var(--green)');
    } else {
      addLog('   ❌ No candle data returned', 'var(--red)');
      addLog('   → Check if your Upstox app has Market Data scope enabled', 'var(--gold)');
    }
  } catch(e) {
    addLog('   ❌ Candles error: ' + e.message, 'var(--red)');
    addLog('   → Upstox historical data may need additional API scope', 'var(--gold)');
  }
}

            const days = Math.floor((Date.now() - cached.ts) / 86400000);

            cacheInfo = stockCount + ' NSE stocks cached · refreshes in ' + expires + ' day' + (expires !== 1 ? 's' : '');

        typically 1,800+ stocks. The scan itself filters by technical criteria
        so results stay focused and actionable.
      </div>

      <div style="font-size:11px;color:var(--muted);line-height:1.8">
        ✅ <strong style="color:var(--text)">Real:</strong> RSI, EMA 20/50, MACD from Upstox daily candles<br/>

        ⚠️ <strong style="color:var(--text)">Estimate:</strong> FII/DII data (not in Upstox free API)<br/>
        ⚠️ <strong style="color:var(--text)">Always verify</strong> on TradingView before placing orders
      </div>
    </div>
  `;
}

async function refreshInstruments() {
  // Force clear cache so loadInstruments fetches fresh
  localStorage.removeItem(INST_CACHE_KEY);
  IKEYS = Object.assign({}, SEED_IKEYS);
  UNIVERSE = SEED_UNIVERSE.slice();
  showToast('🔄 Downloading fresh instrument list…');
  renderSetup(); // show updated count immediately
  const ok = await loadInstruments(true); // forceRefresh=true
  renderSetup(); // refresh again after load
  if (!ok) showToast('❌ Download failed — check token & proxy are connected');
}

function addTrade() {
  const sym    = document.getElementById('m-sym').value;
  const price  = parseFloat(document.getElementById('m-price').value);
  const qty    = parseInt(document.getElementById('m-qty').value);
  const date   = document.getElementById('m-date').value;
  const target = parseFloat(document.getElementById('m-target').value);
  const sl     = parseFloat(document.getElementById('m-sl').value);
  if (!sym || !price || !qty || !date || !target || !sl) { showToast('⚠️ Fill all fields'); return; }
  const trade = {
    id: Date.now().toString(),
    sym, buyPrice: price, qty, buyDate: date, target, sl,
    cmp: price, status: 'open',
  };
  S.trades.push(trade);
  saveTrades();
  closeModal();
  showToast('✅ ' + sym + ' added to portfolio');
  if (S.tab === 'port') renderPort();
  updatePortfolioPrices();
}

function exitTrade(id, cmp) {
  const trade = S.trades.find(t=>t.id===id);
  if (!trade) return;
  const pnl = (cmp - trade.buyPrice) * trade.qty;
  const pnlPct = ((cmp - trade.buyPrice) / trade.buyPrice * 100).toFixed(2);
  const closedTrade = {
    ...trade, exitPrice: cmp, exitDate: new Date().toISOString().split('T')[0],
    pnl: Math.round(pnl), pnlPct: parseFloat(pnlPct), status: 'closed',
    holdDays: Math.round((new Date() - new Date(trade.buyDate)) / 86400000),
  };
  S.history.push(closedTrade);
  S.trades = S.trades.filter(t=>t.id!==id);
  saveTrades(); saveHistory();
  // 🧠 Teach the brain
  learnFromTrade(closedTrade);
  S.expanded = null;
  showToast((pnl>=0?'✅ Profit ':'❌ Loss ') + '₹' + Math.round(Math.abs(pnl)).toLocaleString('en-IN') + ' booked · Brain updated');
  renderPort();
}

function deleteTrade(id) {
  S.trades = S.trades.filter(t=>t.id!==id);
  saveTrades(); S.expanded = null;
  showToast('🗑 Trade removed');
  renderPort();
}

function clearCreds() {
  S.token = ''; localStorage.removeItem('upstox_token');
  S.demoMode = true; showToast('Disconnected');

}

function toggleAuto() {
  S.autoOn = !S.autoOn;
  const btn = document.getElementById('auto-btn');
  if (S.autoOn) {
    btn.classList.add('on'); btn.textContent = '🟢';
    S.autoTimer = setInterval(() => { runScan(); updateTicker(); updatePortfolioPrices(); }, 5*60*1000);
    showToast('🔄 Auto-scan every 5 min');

    btn.classList.remove('on'); btn.textContent = '🔄';

    showToast('Auto-scan off');
  }
}

async function requestNotif() {
  if (!('Notification' in window)) { showToast('Not supported'); return; }
  const p = await Notification.requestPermission();
  showToast(p==='granted'?'🔔 Notifications on':'Permission denied');
}

let _toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(()=>el.classList.remove('show'), 2800);
}


// ═══════════════════════════════════════
// SIGNAL LOG — Outcome Tracker (Tier 3, item 7)
// ═══════════════════════════════════════
function renderSignalLog() {
  const pg = document.getElementById('page-log');
  if (!pg) return;
  const log = loadSignalLog();

  // Summary stats
  const completed = log.filter(e => e.outcome);
  const wins = completed.filter(e => e.outcome === 'TARGET_HIT').length;
  const losses = completed.filter(e => e.outcome === 'SL_HIT').length;
  const wr = completed.length ? Math.round(wins / completed.length * 100) : null;

  const rows = log.map(e => {
    const decay = checkSignalDecay(e.sym, e.entry, e.date);
    const decayBadge = decay === 'STALE' ? '<span style="color:var(--red);font-size:10px">STALE</span>'
                     : decay === 'WEAKENING' ? '<span style="color:var(--gold);font-size:10px">WEAKENING</span>'
                     : '';
    const outcomeColor = e.outcome === 'TARGET_HIT' ? 'var(--green)'
                       : e.outcome === 'SL_HIT' ? 'var(--red)' : 'var(--text2)';
    const outcomeLabel = e.outcome || 'OPEN';
    return `<div style="border-bottom:1px solid var(--border);padding:10px 0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="font-weight:700">${e.sym}</span>
          <span style="color:var(--text2);font-size:11px;margin-left:6px">${e.date}</span>
          ${decayBadge}
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:11px;color:var(--text2)">Score ${e.score}</span>
          <span style="color:${outcomeColor};font-size:11px;font-weight:600">${outcomeLabel}</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:4px;font-size:11px;color:var(--text2)">
        <span>Entry ₹${e.entry}</span>
        <span>SL ₹${e.sl}</span>
        <span>Target ₹${e.target}</span>
        <span>R:R ${e.rr}</span>
      </div>
      <div style="margin-top:4px;font-size:10px;color:var(--text2)">${(e.flags||[]).join(' · ')}</div>
      ${!e.outcome ? `<div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn-sm" style="background:var(--green);color:#000" onclick="logOutcome(${e.id},'TARGET_HIT')">✅ Target Hit</button>
        <button class="btn-sm" style="background:var(--red);color:#fff" onclick="logOutcome(${e.id},'SL_HIT')">❌ SL Hit</button>
        <button class="btn-sm" onclick="logOutcome(${e.id},'MANUAL_EXIT')">↩ Manual Exit</button>
        <button class="btn-sm" onclick="logOutcome(${e.id},'EXPIRED')">⏱ Expired</button>
      </div>` : `<div style="font-size:11px;color:${outcomeColor};margin-top:4px">${e.outcome} on ${e.outcomeDate||''}${e.pnlPct?' · P&L: '+e.pnlPct+'%':''}</div>`}
    </div>`;
  }).join('');

  pg.innerHTML = `
    <div style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:16px;font-weight:700">Signal Log</div>
        <div style="font-size:11px;color:var(--text2)">${log.length} signals · ${wr !== null ? wr+'% win rate ('+completed.length+' closed)' : 'No closed trades yet'}</div>
      </div>
      ${wr !== null ? `<div style="display:flex;gap:12px;margin-bottom:16px;font-size:12px">
        <div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
          <div style="color:var(--green);font-size:20px;font-weight:700">${wins}</div>
          <div style="color:var(--text2)">Wins</div>
        </div>
        <div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
          <div style="color:var(--red);font-size:20px;font-weight:700">${losses}</div>
          <div style="color:var(--text2)">Losses</div>
        </div>
        <div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
          <div style="color:var(--gold);font-size:20px;font-weight:700">${wr}%</div>
          <div style="color:var(--text2)">Win Rate</div>
        </div>
      </div>` : ''}
      ${log.length === 0 ? '<div style="text-align:center;color:var(--text2);padding:40px">Run a scan to auto-log signals here</div>' : rows}
    </div>`;
}

function logOutcome(id, outcome) {
  const log = loadSignalLog();
  const entry = log.find(e => e.id === id);
  if (!entry) return;
  entry.outcome = outcome;
  entry.outcomeDate = new Date().toISOString().split('T')[0];

  // Try to compute P&L from current LTP cache
  try {
    const ltpCache = JSON.parse(localStorage.getItem('ltp_cache') || '{}');
    const ltp = ltpCache[entry.sym];
    if (ltp && entry.entry) {
      entry.exitPrice = ltp;
      entry.pnlPct = ((ltp - entry.entry) / entry.entry * 100).toFixed(1);
    }
  } catch {}

  saveSignalLog(log);
  renderSignalLog();
}

function switchTab(tab) {
  S.tab = tab; S.expanded = null;
  ['scan','port','hist','setup','log'].forEach(t=>{
    document.getElementById(`page-${t}`).classList.toggle('active', t===tab);
    document.getElementById(`tab-${t}`)?.classList.toggle('active', t===tab);
    document.getElementById(`nav-${t}`)?.classList.toggle('active', t===tab);
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (S.tab==='scan') renderScan();
  else if (S.tab==='port') renderPort();
  else if (S.tab==='hist') renderHist();
  else if (S.tab==='setup') renderSetup();
  else if (S.tab==='log') renderSignalLog();
}

window.addEventListener('load', () => {
  document.getElementById('sfill').style.width = '100%';
  setTimeout(() => {
    const sp = document.getElementById('splash');
    sp.style.opacity = '0';
    setTimeout(() => {
      sp.style.display = 'none';
      document.getElementById('main-ui').style.display = 'block';
      document.getElementById('ticker-bar').style.display = 'flex';
      document.getElementById('tabs').style.display = 'flex';
      document.getElementById('bnav').style.display = 'flex';
      switchTab('scan');
      // Load instrument cache FIRST — populates IKEYS + UNIVERSE from localStorage
      // so that when the user taps Scan, all 2400+ stocks are ready immediately
      loadInstruments(false).then(ok => {
        if (ok) {
          console.log('Startup: instruments loaded, universe size =', UNIVERSE.length);
          renderScan(); // update the stock count display
        }
      });
      // Restore cached ticker values immediately (before any API call)
      loadTickerCache();
      // Then fetch fresh values from Upstox
      updateTicker();
      // Retry once more after 3s in case token wasn't ready on first call
      setTimeout(updateTicker, 3000);
      setInterval(updateTicker, 3*60*1000);          // refresh every 3 min
      setInterval(updatePortfolioPrices, 2*60*1000); // portfolio prices every 2 min
    }, 500);
  }, 2400);
});
