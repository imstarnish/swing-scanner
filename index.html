<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#030609"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SwingScanner"/>
  <link rel="manifest" href="manifest.json"/>
  <title>NSE Swing Scanner Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #030609;
      --bg2:      #070d14;
      --surface:  #0b1520;
      --surface2: #0f1d2e;
      --border:   #162438;
      --border2:  #1e3550;
      --accent:   #00c8ff;
      --green:    #00e5a0;
      --red:      #ff3d5a;
      --gold:     #ffb800;
      --purple:   #a78bfa;
      --text:     #c8d8e8;
      --muted:    #3d5a78;
      --radius:   14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;overflow-x:hidden}
    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px;transition:opacity .6s}
    .splash-icon{font-size:52px;animation:float 2s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .splash-title{font-size:24px;font-weight:800;color:#fff;letter-spacing:1px}
    .splash-sub{font-size:10px;color:var(--muted);letter-spacing:4px}
    .splash-bar{width:180px;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .splash-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));width:0;transition:width 2.2s ease;border-radius:2px}
    /* ── HEADER ── */
    .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100}
    .header-row{display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .h-icon{width:34px;height:34px;background:linear-gradient(135deg,#003d55,#006688);border:1px solid var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .h-title{font-size:15px;font-weight:800;color:#e8f4ff}
    .h-sub{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:1px}
    .h-btns{display:flex;gap:8px}
    .hbtn{width:34px;height:34px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
    .hbtn.on{border-color:var(--green);background:#00e5a015;color:var(--green)}
    /* ── TICKER ── */
    .ticker-bar{background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;padding:7px 14px;gap:20px}
    .ticker-bar::-webkit-scrollbar{display:none}
    .ti{display:flex;flex-direction:column;flex-shrink:0;gap:1px}
    .ti-label{font-size:8px;color:var(--muted);letter-spacing:1.5px;font-family:'JetBrains Mono',monospace}
    .ti-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
    /* ── TABS ── */
    .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 8px}
    .tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    /* ── CONTENT ── */
    .page{padding:14px 14px 90px;display:none}
    .page.active{display:block}
    /* ── CARDS / SHARED ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
    .card.highlight{border-color:var(--accent)}
    .card-body{padding:14px}
    /* ── STAT ROW ── */
    .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
    .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
    .stat-box.wide{grid-column:span 3}
    .slabel{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:3px}
    .sval{font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .ssub{font-size:9px;color:var(--muted);margin-top:2px}
    /* ── SCAN BTN ── */
    .scan-btn{width:100%;padding:15px;background:linear-gradient(135deg,#003a55,#00567a);border:1px solid var(--accent);border-radius:var(--radius);color:#fff;font-family:'Manrope',sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;transition:all .2s}
    .scan-btn:active{transform:scale(.98)}
    .scan-btn.busy{background:linear-gradient(135deg,#002a1a,#003d28);border-color:var(--green)}
    /* ── CHIPS ── */
    .chips{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:12px}
    .chips::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .2s}
    .chip.active{background:#003a55;border-color:var(--accent);color:var(--accent)}
    /* ── STOCK CARD ── */
    .sc-head{padding:13px 14px;cursor:pointer}
    .sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .sc-sym{font-size:15px;font-weight:800;color:#e8f4ff}
    .sc-name{font-size:9px;color:var(--muted);margin-top:2px}
    .sc-badges{display:flex;gap:5px;align-items:center}
    .badge{padding:3px 9px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.5px}
    .badge-sb{background:#00c8ff18;border:1px solid var(--accent);color:var(--accent)}
    .badge-b{background:#00e5a018;border:1px solid var(--green);color:var(--green)}
    .badge-sec{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
    .badge-live{font-size:8px;color:var(--green)}
    .sc-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .met-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:2px}
    .met-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .c-green{color:var(--green)} .c-red{color:var(--red)} .c-gold{color:var(--gold)} .c-blue{color:var(--accent)} .c-purple{color:var(--purple)}
    /* ── DETAIL PANEL ── */
    .detail{border-top:1px solid var(--border);padding:13px;background:var(--bg2)}
    .trade-plan{background:var(--surface);border-radius:10px;padding:12px;margin-bottom:10px}
    .tp-title{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:8px}
    .tp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
    .tp-row:last-child{border-bottom:none}
    .tp-key{font-size:11px;color:var(--muted)}
    .tp-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
    /* ── INDICATORS ROW ── */
    .ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
    .ind-box{background:var(--surface);border-radius:8px;padding:9px 10px;border:1px solid var(--border)}
    .ind-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:3px}
    .ind-val{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
    /* ── PROGRESS ── */
    .prog-wrap{margin-bottom:10px}
    .prog-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:4px;font-family:'JetBrains Mono',monospace}
    .prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
    .prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--green))}
    /* ── ADD TO PORTFOLIO BTN ── */
    .add-btn{width:100%;padding:11px;background:linear-gradient(135deg,#1a0a30,#2d1060);border:1px solid var(--purple);border-radius:10px;color:var(--purple);font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:4px}
    /* ── PORTFOLIO ── */
    .port-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .ps-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
    .ps-label{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:4px}
    .ps-val{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .ps-sub{font-size:9px;color:var(--muted);margin-top:2px}
    /* ── TRADE CARD ── */
    .trade-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
    .trade-card.profit{border-left:3px solid var(--green)}
    .trade-card.loss{border-left:3px solid var(--red)}
    .trade-card.target-hit{border-left:3px solid var(--gold)}
    .tc-head{padding:13px 14px;cursor:pointer}
    .tc-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .tc-sym{font-size:15px;font-weight:800;color:#e8f4ff}
    .tc-pnl{font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .tc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .tc-detail{border-top:1px solid var(--border);padding:13px;background:var(--bg2)}
    /* ── ADD TRADE FORM ── */
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
    .form-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:12px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .form-row.single{grid-template-columns:1fr}
    .flabel{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;display:block}
    .finput{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
    .finput:focus{border-color:var(--accent)}
    .fselect{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Manrope',sans-serif;font-size:12px;outline:none;appearance:none}
    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#003a55,#00567a);border:1px solid var(--accent);border-radius:10px;color:#fff;font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;cursor:pointer;margin-top:4px}
    .btn-exit{padding:8px 16px;background:#2a0a10;border:1px solid var(--red);border-radius:8px;color:var(--red);font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
    .btn-del{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Manrope',sans-serif;font-size:11px;cursor:pointer}
    /* ── SETUP PAGE ── */
    .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:14px}
    .setup-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:12px}
    .step{display:flex;gap:11px;margin-bottom:13px}
    .step-n{width:22px;height:22px;background:var(--accent);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
    .step-t{font-size:12px;font-weight:700;color:#e8f4ff;margin-bottom:3px}
    .step-d{font-size:10px;color:var(--muted);line-height:1.6}
    .step-link{color:var(--accent);font-size:10px}
    .conn-bar{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:11px;margin-bottom:14px}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
    .dot.demo{background:var(--gold)}
    .dot.off{background:var(--red)}
    /* ── SPINNER / SHIMMER ── */
    .spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:6px}
    @keyframes shim{to{background-position:-200% 0}}
    /* ── BOTTOM NAV ── */
    .bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;color:var(--muted);font-size:8px;letter-spacing:1px;font-weight:700;transition:color .2s}
    .bni.active{color:var(--accent)}
    .bni-icon{font-size:19px}
    /* ── EMPTY ── */
    .empty{text-align:center;padding:50px 20px}
    .empty-icon{font-size:44px;margin-bottom:14px;opacity:.3}
    .empty-t{font-size:15px;font-weight:700;color:var(--muted);margin-bottom:7px}
    .empty-s{font-size:11px;color:var(--muted);line-height:1.6}
    /* ── TOAST ── */
    .toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:9px 18px;font-size:11px;color:var(--text);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-weight:600}
    .toast.show{opacity:1}
    /* ── MODAL ── */
    .modal-bg{position:fixed;inset:0;background:#000a;z-index:200;display:none;align-items:flex-end}
    .modal-bg.open{display:flex}
    .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-height:85vh;overflow-y:auto}
    .modal-title{font-size:14px;font-weight:800;color:#e8f4ff;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
    .modal-close{background:var(--surface);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
    /* ── MISC ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .25s ease forwards}
    .disclaimer{font-size:9px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;line-height:1.7;margin-top:14px}
  </style>
</head>
<body>

<!-- SPLASH -->

<div id="splash">
  <div class="splash-icon">📡</div>
  <div class="splash-title">SWING SCANNER</div>
  <div class="splash-sub">NSE · REAL INDICATORS · PORTFOLIO</div>
  <div class="splash-bar"><div class="splash-fill" id="sfill"></div></div>
</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<!-- ADD TRADE MODAL -->

<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div class="modal-title">
      <span>📥 Add Trade</span>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- HEADER -->

<div class="header" id="main-ui" style="display:none">
  <div class="header-row">
    <div class="header-left">
      <div class="h-icon">📡</div>
      <div>
        <div class="h-title">SWING SCANNER</div>
        <div class="h-sub" id="h-sub">NSE · INDIA EQUITY</div>
      </div>
    </div>
    <div class="h-btns">
      <div class="hbtn" id="auto-btn" onclick="toggleAuto()">🔄</div>
      <div class="hbtn" onclick="requestNotif()">🔔</div>
    </div>
  </div>
</div>

<!-- TICKER -->

<div class="ticker-bar" id="ticker-bar" style="display:none">
  <div class="ti"><div class="ti-label">NIFTY 50</div><div class="ti-val" id="t-nifty">–</div></div>
  <div class="ti"><div class="ti-label">BANK NIFTY</div><div class="ti-val" id="t-bn">–</div></div>
  <div class="ti"><div class="ti-label">INDIA VIX</div><div class="ti-val" id="t-vix" style="color:var(--gold)">–</div></div>
  <div class="ti"><div class="ti-label">SENSEX</div><div class="ti-val" id="t-sx">–</div></div>
  <div class="ti"><div class="ti-label">MARKET</div><div class="ti-val" id="t-bias" style="color:var(--green)">–</div></div>
</div>

<!-- TABS -->

<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" id="tab-scan" onclick="switchTab('scan')">📊 SCAN</div>
  <div class="tab" id="tab-port" onclick="switchTab('port')">💼 PORTFOLIO</div>
  <div class="tab" id="tab-hist" onclick="switchTab('hist')">📈 HISTORY</div>
  <div class="tab" id="tab-setup" onclick="switchTab('setup')">⚙️ SETUP</div>
</div>

<!-- PAGES -->

<div class="page active" id="page-scan"></div>
<div class="page" id="page-port"></div>
<div class="page" id="page-hist"></div>
<div class="page" id="page-setup"></div>

<!-- BOTTOM NAV -->

<div class="bnav" id="bnav" style="display:none">
  <div class="bni active" id="nav-scan" onclick="switchTab('scan')"><div class="bni-icon">📊</div>SCAN</div>
  <div class="bni" id="nav-port" onclick="switchTab('port')"><div class="bni-icon">💼</div>PORTFOLIO</div>
  <div class="bni" id="nav-hist" onclick="switchTab('hist')"><div class="bni-icon">📈</div>HISTORY</div>
  <div class="bni" id="nav-setup" onclick="switchTab('setup')"><div class="bni-icon">⚙️</div>SETUP</div>
</div>

<script>
// ═══════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════
const S = {
  tab: 'scan',
  results: [],
  scanning: false,
  filterSec: 'All',
  expanded: null,
  autoOn: false,
  autoTimer: null,
  demoMode: true,
  // Upstox credentials
  token: localStorage.getItem('upstox_token') || '',
  proxyUrl: localStorage.getItem('proxy_url') || '',
  // Portfolio: active trades
  trades: JSON.parse(localStorage.getItem('trades') || '[]'),
  // Closed trades history
  history: JSON.parse(localStorage.getItem('history') || '[]'),
};

function saveTrades(){ localStorage.setItem('trades', JSON.stringify(S.trades)); }
function saveHistory(){ localStorage.setItem('history', JSON.stringify(S.history)); }

// ═══════════════════════════════════════
// UPSTOX INSTRUMENT KEYS
// ═══════════════════════════════════════
const IKEYS = {
  'RELIANCE':'NSE_EQ|INE002A01018','TCS':'NSE_EQ|INE467B01029','HDFCBANK':'NSE_EQ|INE040A01034',
  'ICICIBANK':'NSE_EQ|INE090A01021','INFY':'NSE_EQ|INE009A01021','SBIN':'NSE_EQ|INE062A01020',
  'WIPRO':'NSE_EQ|INE075A01022','LT':'NSE_EQ|INE018A01030','BAJFINANCE':'NSE_EQ|INE296A01024',
  'AXISBANK':'NSE_EQ|INE238A01034','TATAMOTORS':'NSE_EQ|INE155A01022','MARUTI':'NSE_EQ|INE585B01010',
  'SUNPHARMA':'NSE_EQ|INE044A01036','DRREDDY':'NSE_EQ|INE089A01023','CIPLA':'NSE_EQ|INE059A01026',
  'HCLTECH':'NSE_EQ|INE860A01027','POWERGRID':'NSE_EQ|INE752E01010','NTPC':'NSE_EQ|INE733E01010',
  'ONGC':'NSE_EQ|INE213A01029','COALINDIA':'NSE_EQ|INE522F01014','TATASTEEL':'NSE_EQ|INE081A01012',
  'JSWSTEEL':'NSE_EQ|INE019A01038','HINDALCO':'NSE_EQ|INE038A01020','TITAN':'NSE_EQ|INE280A01028',
  'ASIANPAINT':'NSE_EQ|INE021A01026','BAJAJFINSV':'NSE_EQ|INE918I01026','DIVISLAB':'NSE_EQ|INE361B01024',
  'ADANIENT':'NSE_EQ|INE423A01024','NESTLEIND':'NSE_EQ|INE239A01016','GRASIM':'NSE_EQ|INE047A01021',
};

const UNIVERSE = [
  {s:'RELIANCE',n:'Reliance Industries',sec:'Energy'},
  {s:'TCS',n:'Tata Consultancy',sec:'IT'},
  {s:'HDFCBANK',n:'HDFC Bank',sec:'Banking'},
  {s:'ICICIBANK',n:'ICICI Bank',sec:'Banking'},

// ═══════════════════════════════════════
// UPSTOX API CALLS
// ═══════════════════════════════════════
async function upstoxGet(path) {
  const base = 'https://api.upstox.com/v2';
  const headers = { 'Authorization': `Bearer ${S.token}`, 'Accept': 'application/json' };

  // Always route through proxy when set (bypasses GitHub Pages CORS block)
  if (S.proxyUrl) {
    const proxyBase = S.proxyUrl.replace(/\/$/, '');
    const url = proxyBase + '/proxy?path=' + encodeURIComponent(path);
    const r = await fetch(url, { headers });
    if (!r.ok) {
      const txt = await r.text();
      throw new Error('Proxy ' + r.status + ': ' + txt.slice(0,120));
    }
    return r.json();
  }

  // Direct call — blocked by CORS on GitHub Pages, works only locally
  const r = await fetch(base + path, { headers });
  if (!r.ok) throw new Error('Upstox ' + r.status);
  return r.json();
}

async function fetchLTP(symbols) {
  const keys = symbols.map(s => IKEYS[s]).filter(Boolean).join(',');
  const data = await upstoxGet(`/market-quote/ltp?instrument_key=${encodeURIComponent(keys)}`);
  if (data.status !== 'success') return null;
  const out = {};
  for (const [k, v] of Object.entries(data.data)) {
    const sym = Object.entries(IKEYS).find(([s,ik]) => ik===k)?.[0];
    if (sym) out[sym] = v.last_price;
  }
  return out;
}

async function fetchCandles(symbol, days=120) {
  // Upstox historical candles endpoint
  // Request 120 calendar days to get ~85 trading days (enough for EMA50 + RSI14)
  const key = encodeURIComponent(IKEYS[symbol]);

  // 'to' must be tomorrow to include today's candle
  const to = new Date();
  to.setDate(to.getDate() + 1);
  const toStr = to.toISOString().split('T')[0];

  // 'from' = days ago
  const from = new Date();
  from.setDate(from.getDate() - days);
  const fromStr = from.toISOString().split('T')[0];

  try {
    const data = await upstoxGet('/historical-candle/' + key + '/day/' + toStr + '/' + fromStr);
    if (data.status === 'success' && data.data && data.data.candles && data.data.candles.length > 0) {
      return data.data.candles.map(function(c) {
        return { date: c[0], open: c[1], high: c[2], low: c[3], close: c[4], volume: c[5] };
      }).reverse(); // oldest first
    }
    console.warn('Candle fetch for ' + symbol + ':', JSON.stringify(data).slice(0,100));
  } catch(e) {
    console.warn('Candle error for ' + symbol + ':', e.message);
  }
  return null;
}

// ═══════════════════════════════════════
// TECHNICAL INDICATORS (Real Math)
// ═══════════════════════════════════════
function calcEMA(closes, period) {
  if (closes.length < period) return null;
  const k = 2 / (period + 1);
  let ema = closes.slice(0, period).reduce((a,b) => a+b, 0) / period;
  for (let i = period; i < closes.length; i++) {
    ema = closes[i] * k + ema * (1 - k);
  }
  return ema;
}

function calcRSI(closes, period=14) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const diff = closes[i] - closes[i-1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  const avgGain = gains / period;
  const avgLoss = losses / period;
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

function calcMACD(closes) {
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  if (!ema12 || !ema26) return null;
  const macdLine = ema12 - ema26;
  // Signal = 9-period EMA of MACD (approximated with last values)
  return { macdLine, bullish: macdLine > 0 };
}

function calcAvgVolume(candles, days=20) {
  const recent = candles.slice(-days);
  return recent.reduce((a,c) => a + c.volume, 0) / recent.length;
}

function detectSetup(candles, ema20, ema50, rsi) {
  if (!candles || candles.length < 5) return 'Momentum';
  const last = candles[candles.length-1];
  const prev = candles[candles.length-2];
  const close = last.close;
  const high52 = Math.max(...candles.slice(-52).map(c => c.high));
  const low52  = Math.min(...candles.slice(-52).map(c => c.low));

  if (close > high52 * 0.98) return 'Breakout';
  if (close < low52 * 1.05 && rsi < 35) return 'Reversal';
  if (close > ema20 && prev.close < ema20) return 'EMA Reclaim';
  if (rsi < 40 && close > prev.close) return 'Oversold Bounce';
  if (close > ema20 && close > ema50 && rsi > 50 && rsi < 65) return 'Momentum';
  return 'Pullback';
}

function calcSLTarget(candles, ltp) {
  // Use recent swing lows/highs for realistic SL and Target
  if (!candles || candles.length < 10) {
    return { sl: Math.round(ltp * 0.955), target: Math.round(ltp * 1.12) };
  }
  const recent10 = candles.slice(-10);
  const swingLow  = Math.min(...recent10.map(c => c.low));
  const swingHigh = Math.max(...recent10.map(c => c.high));
  // SL slightly below recent swing low (but max 8% below LTP)
  const sl = Math.round(Math.max(swingLow * 0.99, ltp * 0.92));
  // Target = risk × 2.5 above entry (swing approach)
  const risk = ltp - sl;
  const target = Math.round(Math.min(ltp + risk * 2.5, swingHigh * 1.05, ltp * 1.18));
  return { sl, target };
}

async function runScan() {
  if (S.scanning) return;
  S.scanning = true; S.results = []; S.expanded = null;
  renderScan();

  let ltpMap = null;
  if (S.token) {
    try {
      ltpMap = await fetchLTP(UNIVERSE.map(u=>u.s));
    } catch(e) {
      console.error('LTP fetch failed:', e.message);
      S.scanning = false; S.demoMode = true; S.results = [];
      renderScan();
      showToast('❌ API Error: ' + e.message.slice(0,50));
      return;
    }
  }

  if (!ltpMap) {
    // No token or API failed — show clear message
    S.scanning = false; S.demoMode = true;
    S.results = [];
    renderScan();
    showToast('⚠️ Connect Upstox in Setup for real data');
    return;
  }

  S.demoMode = false;
  showToast('📊 Fetching candles & calculating indicators…');

  const qualified = [];

  // Process each stock — fetch candles, calculate real indicators
  for (const stock of UNIVERSE) {
    const ltp = ltpMap[stock.s];
    if (!ltp) continue;

    // Fetch 60 days of daily candles
    const candles = await fetchCandles(stock.s, 60);
    if (!candles || candles.length < 20) continue; // need at least 20 trading days

    const closes = candles.map(c => c.close);
    const rsi   = calcRSI(closes, 14);
    const ema20 = calcEMA(closes, 20);
    const ema50 = calcEMA(closes, 50);
    const macd  = calcMACD(closes);
    const avgVol = calcAvgVolume(candles, 20);
    const lastVol = candles[candles.length-1].volume;
    const volMult = avgVol > 0 ? lastVol / avgVol : 1;

    if (!rsi || !ema20) continue;

    // SCAN FILTERS — all must pass
    const rsiOk   = rsi >= 30 && rsi <= 65;           // Not overbought, not deeply oversold
    const emaOk   = ltp > ema20;                      // Price above 20 EMA
    const macdOk  = macd?.bullish;                    // MACD positive
    const volOk   = volMult >= 1.3;                   // Volume surge

    if (!rsiOk || !emaOk || !macdOk || !volOk) continue;

    const { sl, target } = calcSLTarget(candles, ltp);
    const upsidePct = ((target - ltp) / ltp * 100);
    const riskPct   = ((ltp - sl) / ltp * 100);
    const rr        = (upsidePct / riskPct);

    // Must have ≥10% upside and R:R ≥ 1.5
    if (upsidePct < 10 || rr < 1.5) continue;

    const setup = detectSetup(candles, ema20, ema50, rsi);
    const verdict = rr >= 2.5 ? 'STRONG BUY' : 'BUY';

    qualified.push({
      sym: stock.s, name: stock.n, sector: stock.sec,
      ltp: Math.round(ltp), entry: Math.round(ltp),
      target, sl,
      upsidePct: upsidePct.toFixed(1),
      riskPct: riskPct.toFixed(1),
      rr: rr.toFixed(1),
      rsi: rsi.toFixed(1),
      ema20: Math.round(ema20),
      ema50: ema50 ? Math.round(ema50) : '–',
      macdBull: macd?.bullish,
      volMult: volMult.toFixed(1),
      setup, verdict,
      scanTime: new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
    });
  }

  S.results = qualified.sort((a,b) => parseFloat(b.rr) - parseFloat(a.rr));
  S.scanning = false;
  renderScan();
  updateTicker();
  showToast(`✅ ${S.results.length} real setups found`);
  updatePortfolioPrices();
}

async function updateTicker() {

  try {

    const d = data.data;
    const set = (id, key, decimals=0) => {
      const el = document.getElementById(id);
      const val = d[key]?.last_price;
      if (val && el) {
        const prev = parseFloat(el.dataset.prev || val);
        el.style.color = val >= prev ? 'var(--green)' : 'var(--red)';

    set('t-bn','NSE_INDEX|Nifty Bank',0);
    set('t-sx','BSE_INDEX|SENSEX',0);
    const vix = d['NSE_INDEX|India VIX']?.last_price;

      vel.textContent = vix.toFixed(2);
      vel.style.color = vix > 17 ? 'var(--red)' : vix > 13 ? 'var(--gold)' : 'var(--green)';

    const niftyVal = d['NSE_INDEX|Nifty 50']?.last_price;
    const prevNifty = parseFloat(document.getElementById('t-nifty').dataset.prevraw || niftyVal);
    document.getElementById('t-bias').textContent = niftyVal >= prevNifty ? 'BULLISH' : 'BEARISH';

    document.getElementById('h-sub').textContent = `🟢 LIVE · ${new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) { console.warn('Ticker fetch failed', e); }
}

function renderTradeCard(t, i) {
  const cmp     = t.cmp || t.buyPrice;
  const pnl     = (cmp - t.buyPrice) * t.qty;
  const pnlPct  = ((cmp - t.buyPrice) / t.buyPrice * 100).toFixed(2);
  const isProfit = pnl >= 0;
  const targetHit = cmp >= t.target;
  const slHit     = cmp <= t.sl;
  const cls = targetHit ? 'target-hit' : slHit ? 'loss' : isProfit ? 'profit' : 'loss';
  const prog = Math.min(100, Math.max(0,((cmp - t.sl)/(t.target - t.sl)*100))).toFixed(0);
  const isExp = S.expanded === ('port_'+t.id);

  return `
    <div class="trade-card ${cls} fade-up" style="animation-delay:${i*0.05}s">
      <div class="tc-head" onclick="toggleExp('port_${t.id}')">
        <div class="tc-row1">
          <div>
            <div class="tc-sym">${t.sym}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${t.qty} qty · Bought ₹${t.buyPrice} · ${t.buyDate}</div>
          </div>
          <div>
            <div class="tc-pnl" style="color:${isProfit?'var(--green)':'var(--red)'}">
              ${isProfit?'+':''}₹${Math.round(Math.abs(pnl)).toLocaleString('en-IN')}
            </div>
            <div style="font-size:10px;text-align:right;color:${isProfit?'var(--green)':'var(--red)'}">
              ${isProfit?'+':''}${pnlPct}%
            </div>
          </div>
        </div>
        <div class="tc-metrics">
          <div><div class="met-label">CMP</div><div class="met-val">₹${cmp.toLocaleString('en-IN',{maximumFractionDigits:1})}</div></div>
          <div><div class="met-label">TARGET</div><div class="met-val c-green">₹${t.target.toLocaleString('en-IN')}</div></div>
          <div><div class="met-label">STOP LOSS</div><div class="met-val c-red">₹${t.sl.toLocaleString('en-IN')}</div></div>
        </div>
        ${targetHit ? '<div style="font-size:10px;color:var(--gold);margin-top:7px;font-weight:700">🎯 TARGET REACHED — Consider booking profits</div>' : ''}
        ${slHit ? '<div style="font-size:10px;color:var(--red);margin-top:7px;font-weight:700">🔴 STOP LOSS HIT — Consider exiting</div>' : ''}
      </div>
      ${isExp ? `
      <div class="tc-detail">
        <div class="prog-wrap">
          <div class="prog-labels"><span>SL ₹${t.sl}</span><span>CMP</span><span>T ₹${t.target}</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
        </div>
        <div class="ind-grid" style="margin-bottom:12px">
          <div class="ind-box"><div class="ind-label">INVESTED</div><div class="ind-val">₹${Math.round(t.buyPrice*t.qty).toLocaleString('en-IN')}</div></div>
          <div class="ind-box"><div class="ind-label">CURRENT</div><div class="ind-val">₹${Math.round(cmp*t.qty).toLocaleString('en-IN')}</div></div>
          <div class="ind-box"><div class="ind-label">UPSIDE LEFT</div><div class="ind-val c-green">+${((t.target-cmp)/cmp*100).toFixed(1)}%</div></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-exit" onclick="exitTrade('${t.id}',${cmp})">🚪 Exit at CMP ₹${cmp.toLocaleString('en-IN',{maximumFractionDigits:1})}</button>
          <button class="btn-del" onclick="deleteTrade('${t.id}')">🗑</button>
        </div>
      </div>` : ''}
    </div>`;
}

async function runDiagnostic() {
  const panel = document.getElementById('diag-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="setup-card"><div class="setup-title">🔬 RUNNING DIAGNOSTICS...</div><div id="diag-log" style="font-size:11px;font-family:JetBrains Mono,monospace;line-height:2;color:var(--muted)"></div></div>';
  const log = document.getElementById('diag-log');

  function addLog(msg, color) {
    const d = document.createElement('div');
    d.style.color = color || 'var(--text)';
    d.textContent = msg;
    log.appendChild(d);
  }

  addLog('1. Checking proxy URL...', 'var(--muted)');
  if (!S.proxyUrl) { addLog('   ❌ No proxy URL saved', 'var(--red)'); return; }
  addLog('   ✅ Proxy URL: ' + S.proxyUrl, 'var(--green)');

  addLog('2. Testing proxy health...', 'var(--muted)');
  try {
    const r = await fetch(S.proxyUrl.replace(/\/$/, '') + '/proxy', { method: 'GET' });
    const d = await r.json();
    if (d.status && d.status.includes('running')) {
      addLog('   ✅ Proxy is live and responding', 'var(--green)');
    } else {
      addLog('   ⚠️ Proxy responded but unexpected: ' + JSON.stringify(d).slice(0,60), 'var(--gold)');
    }
  } catch(e) {
    addLog('   ❌ Proxy unreachable: ' + e.message, 'var(--red)');
    addLog('   → Check your Netlify site is deployed', 'var(--muted)');
    return;
  }

  addLog('3. Testing Upstox token (LTP call)...', 'var(--muted)');
  try {
    const key = encodeURIComponent('NSE_EQ|INE002A01018');
    const data = await upstoxGet('/market-quote/ltp?instrument_key=' + key);
    if (data.status === 'success') {
      const price = Object.values(data.data)[0]?.last_price;
      addLog('   ✅ Token valid! RELIANCE LTP = ₹' + price, 'var(--green)');
    } else {
      addLog('   ❌ Token failed: ' + JSON.stringify(data).slice(0,100), 'var(--red)');
      addLog('   → Token may be expired. Generate a new one today.', 'var(--gold)');
      return;
    }
  } catch(e) {
    addLog('   ❌ LTP call error: ' + e.message, 'var(--red)');
    return;
  }

  addLog('4. Testing index data (Nifty)...', 'var(--muted)');
  try {
    const key = encodeURIComponent('NSE_INDEX|Nifty 50');
    const data = await upstoxGet('/market-quote/ltp?instrument_key=' + key);
    if (data.status === 'success') {
      const nifty = Object.values(data.data)[0]?.last_price;
      addLog('   ✅ Nifty 50 = ' + nifty, 'var(--green)');
    } else {
      addLog('   ⚠️ Index data failed: ' + JSON.stringify(data).slice(0,80), 'var(--gold)');
    }
  } catch(e) {
    addLog('   ⚠️ Index call error: ' + e.message, 'var(--gold)');
  }

  addLog('5. Testing historical candles (RELIANCE 10 days)...', 'var(--muted)');
  try {
    const candles = await fetchCandles('RELIANCE', 10);
    if (candles && candles.length > 0) {
      addLog('   ✅ Got ' + candles.length + ' candles. Last close: ₹' + candles[candles.length-1].close, 'var(--green)');
      addLog('', '');
      addLog('✅ ALL SYSTEMS OK — Tap Run Real Scan now!', 'var(--green)');
    } else {
      addLog('   ❌ No candle data returned', 'var(--red)');
      addLog('   → Check if your Upstox app has Market Data scope enabled', 'var(--gold)');
    }
  } catch(e) {
    addLog('   ❌ Candles error: ' + e.message, 'var(--red)');
    addLog('   → Upstox historical data may need additional API scope', 'var(--gold)');
  }
}

function addTrade() {
  const sym    = document.getElementById('m-sym').value;
  const price  = parseFloat(document.getElementById('m-price').value);
  const qty    = parseInt(document.getElementById('m-qty').value);
  const date   = document.getElementById('m-date').value;
  const target = parseFloat(document.getElementById('m-target').value);
  const sl     = parseFloat(document.getElementById('m-sl').value);
  if (!sym || !price || !qty || !date || !target || !sl) { showToast('⚠️ Fill all fields'); return; }
  const trade = {
    id: Date.now().toString(),
    sym, buyPrice: price, qty, buyDate: date, target, sl,
    cmp: price, status: 'open',
  };
  S.trades.push(trade);
  saveTrades();
  closeModal();
  showToast(`✅ ${sym} added to portfolio`);
  if (S.tab === 'port') renderPort();
  updatePortfolioPrices();
}

function exitTrade(id, cmp) {
  const trade = S.trades.find(t=>t.id===id);
  if (!trade) return;
  const pnl = (cmp - trade.buyPrice) * trade.qty;
  const pnlPct = ((cmp - trade.buyPrice) / trade.buyPrice * 100).toFixed(2);
  S.history.push({
    ...trade, exitPrice: cmp, exitDate: new Date().toISOString().split('T')[0],
    pnl: Math.round(pnl), pnlPct: parseFloat(pnlPct), status: 'closed'
  });
  S.trades = S.trades.filter(t=>t.id!==id);
  saveTrades(); saveHistory();
  S.expanded = null;
  showToast(`${pnl>=0?'✅ Profit':'❌ Loss'} ₹${Math.round(Math.abs(pnl)).toLocaleString('en-IN')} booked`);
  renderPort();
}

function deleteTrade(id) {
  S.trades = S.trades.filter(t=>t.id!==id);
  saveTrades(); S.expanded = null;
  showToast('🗑 Trade removed');
  renderPort();
}

function toggleExp(key) { S.expanded = S.expanded===key ? null : key; renderCurrentTab(); }

function saveCreds() {
  S.token = document.getElementById('f-tok').value.trim();
  S.proxyUrl = document.getElementById('f-proxy').value.trim();
  localStorage.setItem('upstox_token', S.token);
  localStorage.setItem('proxy_url', S.proxyUrl);
  showToast('✅ Saved! Run scan for live data');
  renderSetup();
}
function clearCreds() {
  S.token = ''; localStorage.removeItem('upstox_token');
  S.demoMode = true; showToast('Disconnected');
  renderSetup();
}

function toggleAuto() {
  S.autoOn = !S.autoOn;
  const btn = document.getElementById('auto-btn');
  if (S.autoOn) {
    btn.classList.add('on'); btn.textContent = '🟢';
    S.autoTimer = setInterval(() => { runScan(); updateTicker(); updatePortfolioPrices(); }, 5*60*1000);
    showToast('🔄 Auto-scan every 5 min');
  } else {
    btn.classList.remove('on'); btn.textContent = '🔄';
    clearInterval(S.autoTimer);
    showToast('Auto-scan off');
  }
}

async function requestNotif() {
  if (!('Notification' in window)) { showToast('Not supported'); return; }
  const p = await Notification.requestPermission();
  showToast(p==='granted'?'🔔 Notifications on':'Permission denied');
}

let _toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(()=>el.classList.remove('show'), 2800);
}

function switchTab(tab) {
  S.tab = tab; S.expanded = null;
  ['scan','port','hist','setup'].forEach(t=>{
    document.getElementById(`page-${t}`).classList.toggle('active', t===tab);
    document.getElementById(`tab-${t}`)?.classList.toggle('active', t===tab);
    document.getElementById(`nav-${t}`)?.classList.toggle('active', t===tab);
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (S.tab==='scan') renderScan();
  else if (S.tab==='port') renderPort();
  else if (S.tab==='hist') renderHist();
  else if (S.tab==='setup') renderSetup();
}

      setInterval(updatePortfolioPrices, 2*60*1000); // portfolio prices every 2 min
    }, 500);
  }, 2400);
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
